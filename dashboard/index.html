<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlanB — Mission Control</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #050816;
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ─── Animated background orbs ──────────────────────────── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      will-change: transform;
    }
    .orb-1 {
      width: 650px; height: 650px;
      top: -220px; left: -220px;
      background: radial-gradient(circle, rgba(99,102,241,0.18) 0%, transparent 70%);
      animation: orbFloat1 20s ease-in-out infinite;
    }
    .orb-2 {
      width: 550px; height: 550px;
      top: 35%; right: -180px;
      background: radial-gradient(circle, rgba(245,158,11,0.12) 0%, transparent 70%);
      animation: orbFloat2 24s ease-in-out infinite;
    }
    .orb-3 {
      width: 500px; height: 500px;
      bottom: -120px; left: 25%;
      background: radial-gradient(circle, rgba(16,185,129,0.1) 0%, transparent 70%);
      animation: orbFloat3 28s ease-in-out infinite;
    }
    .orb-4 {
      width: 350px; height: 350px;
      top: 25%; left: 50%;
      background: radial-gradient(circle, rgba(244,63,94,0.07) 0%, transparent 70%);
      animation: orbFloat4 22s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%,100% { transform: translate(0,0)      scale(1);    }
      33%      { transform: translate(70px,90px) scale(1.1); }
      66%      { transform: translate(-50px,60px) scale(.95); }
    }
    @keyframes orbFloat2 {
      0%,100% { transform: translate(0,0)        scale(1);    }
      40%      { transform: translate(-90px,-70px) scale(1.15); }
      70%      { transform: translate(50px,90px)  scale(.9);  }
    }
    @keyframes orbFloat3 {
      0%,100% { transform: translate(0,0)       scale(1);   }
      30%      { transform: translate(110px,-90px) scale(1.2); }
      60%      { transform: translate(-70px,50px) scale(.85); }
    }
    @keyframes orbFloat4 {
      0%,100% { transform: translate(0,0)      scale(1);   }
      50%      { transform: translate(90px,-70px) scale(1.3); }
    }

    /* ─── Glass morphism ─────────────────────────────────────── */
    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
    }
    .glass-navbar {
      background: rgba(5,8,22,0.75);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* ─── Animations ─────────────────────────────────────────── */
    @keyframes pulseAmber {
      0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,0.45); }
      50%      { box-shadow: 0 0 0 9px rgba(245,158,11,0); }
    }
    @keyframes blinkRed {
      0%,100% { opacity: 1; }
      50%      { opacity: .12; }
    }
    @keyframes slideInTop {
      from { opacity: 0; transform: translateY(-14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes progressGlow {
      0%   { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    @keyframes phoneGlow {
      0%,100% { box-shadow: 0 32px 64px rgba(0,0,0,.6), 0 0 30px rgba(37,211,102,0.1); }
      50%      { box-shadow: 0 32px 64px rgba(0,0,0,.6), 0 0 50px rgba(37,211,102,0.2); }
    }

    .pulse-amber { animation: pulseAmber 1s ease-in-out infinite; }
    .blink-red   { animation: blinkRed 1.1s ease-in-out infinite; }
    .slide-in    { animation: slideInTop .32s ease-out forwards; }
    .fade-up     { animation: fadeUp .45s ease-out forwards; }

    /* ─── Gradient text ──────────────────────────────────────── */
    .grad-amber {
      background: linear-gradient(135deg, #F59E0B 0%, #FCD34D 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .grad-emerald {
      background: linear-gradient(135deg, #10B981 0%, #6EE7B7 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .grad-indigo {
      background: linear-gradient(135deg, #6366F1 0%, #A5B4FC 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .grad-rose {
      background: linear-gradient(135deg, #F43F5E 0%, #FDA4AF 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ─── Buttons ────────────────────────────────────────────── */
    .btn-demo {
      background: linear-gradient(135deg, #B45309 0%, #D97706 30%, #F59E0B 60%, #FCD34D 100%);
      background-size: 200% 200%;
      border: none;
      box-shadow: 0 4px 24px rgba(245,158,11,0.4), 0 0 0 1px rgba(245,158,11,0.25);
      color: #1c1017;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      letter-spacing: .07em;
      transition: all .25s ease;
      cursor: pointer;
    }
    .btn-demo:hover:not(:disabled) {
      box-shadow: 0 8px 36px rgba(245,158,11,0.6), 0 0 0 1px rgba(245,158,11,0.4);
      transform: translateY(-2px);
      background-position: right center;
    }
    .btn-demo:active:not(:disabled) { transform: translateY(0); }
    .btn-demo:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; transform: none; }

    .btn-reset {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.38);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: .05em;
      transition: all .25s ease;
      cursor: pointer;
    }
    .btn-reset:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.65);
      box-shadow: 0 0 16px rgba(255,255,255,0.06);
    }

    /* ─── Calendar cards ─────────────────────────────────────── */
    .cal-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 10px 14px;
      transition: all .25s ease;
    }
    .cal-card:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.055);
      box-shadow: 0 10px 28px rgba(0,0,0,0.35);
      border-color: rgba(255,255,255,0.13);
    }

    /* ─── Progress bar ───────────────────────────────────────── */
    .progress-rainbow {
      height: 2px;
      background: linear-gradient(90deg, #6366F1, #F59E0B, #10B981, #F43F5E, #6366F1);
      background-size: 300% 100%;
      animation: progressGlow 2.4s linear infinite;
      border-radius: 0;
    }

    /* ─── Scrollbar ──────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    /* ─── Layout layer ───────────────────────────────────────── */
    #root { position: relative; z-index: 1; }
  </style>
</head>
<body>

<!-- Background orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="orb orb-4"></div>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── API base URL ─────────────────────────────────────────────────────────
   Override via ?api=http://your-server:8000 in the URL.                    */
const API_BASE = new URLSearchParams(window.location.search).get('api')
  || 'http://localhost:8000';

/* ─── Agent definitions (pipeline order) ──────────────────────────────── */
const AGENTS = [
  { id: 'monitor',      label: 'Monitor',      icon: '👁'  },
  { id: 'context',      label: 'Context',      icon: '🧠'  },
  { id: 'resilience',   label: 'Resilience',   icon: '🛡'  },
  { id: 'priority',     label: 'Priority',     icon: '⚡'  },
  { id: 'orchestrator', label: 'Orchestrator', icon: '🎯'  },
  { id: 'replan',       label: 'Replan',       icon: '📋'  },
  { id: 'routine',      label: 'Routine',      icon: '🔄'  },
  { id: 'scheduler',    label: 'Scheduler',    icon: '📅'  },
  { id: 'negotiate',    label: 'Negotiate',    icon: '🤝'  },
  { id: 'predictive',   label: 'Predictive',   icon: '🔮'  },
  { id: 'crisis',       label: 'Crisis',       icon: '🚨'  },
  { id: 'stress',       label: 'Stress',       icon: '😤'  },
  { id: 'undo',         label: 'Undo',         icon: '↩'   },
  { id: 'comms',        label: 'Comms',        icon: '💬'  },
];
const IDLE_STATE = Object.fromEntries(AGENTS.map(a => [a.id, 'idle']));
const AGENT_IDS  = new Set(AGENTS.map(a => a.id));

/* ─── Helpers ──────────────────────────────────────────────────────────── */
let _uid = 0;
const uid = () => `e${++_uid}-${Date.now()}`;
const now = () => new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

function fmtTime(iso) {
  if (!iso) return '?';
  try {
    return new Date(iso).toLocaleTimeString('en-IN', {
      hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata',
    });
  } catch { return iso; }
}
function fmtDuration(ms) {
  if (ms == null) return '—';
  return ms >= 1000 ? `${(ms / 1000).toFixed(1)}s` : `${ms}ms`;
}
function avg(arr) {
  if (!arr.length) return null;
  return Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
}

/* ─── Badge colour palettes ────────────────────────────────────────────── */
const SEV_PAL = {
  high:   { bg:'rgba(244,63,94,0.14)',   fg:'#fca5a5', bd:'rgba(244,63,94,0.3)'   },
  medium: { bg:'rgba(245,158,11,0.14)',  fg:'#fcd34d', bd:'rgba(245,158,11,0.3)'  },
  low:    { bg:'rgba(16,185,129,0.14)',  fg:'#86efac', bd:'rgba(16,185,129,0.3)'  },
};
const DEC_PAL = {
  kept:       { bg:'rgba(16,185,129,0.12)',  fg:'#4ade80', bd:'rgba(16,185,129,0.25)'  },
  dropped:    { bg:'rgba(244,63,94,0.12)',   fg:'#f87171', bd:'rgba(244,63,94,0.25)'   },
  compressed: { bg:'rgba(245,158,11,0.12)',  fg:'#fcd34d', bd:'rgba(245,158,11,0.25)'  },
  delayed:    { bg:'rgba(99,102,241,0.12)',  fg:'#93c5fd', bd:'rgba(99,102,241,0.25)'  },
};

/* ═══════════════════════════════════════════════════════════════════════════
   Sub-components
   ═══════════════════════════════════════════════════════════════════════════ */

/* ── Agent card ──────────────────────────────────────────────────────────── */
function AgentCard({ agent, status }) {
  const C = {
    idle: {
      border: 'rgba(255,255,255,0.07)',
      leftBorder: 'rgba(255,255,255,0.06)',
      bg:     'rgba(255,255,255,0.025)',
      dot:    'rgba(255,255,255,0.18)',
      lbl:    'rgba(255,255,255,0.28)',
      mark:   null,
      glow:   'none',
    },
    running: {
      border: 'rgba(245,158,11,0.5)',
      leftBorder: '#F59E0B',
      bg:     'rgba(245,158,11,0.09)',
      dot:    '#F59E0B',
      lbl:    '#FCD34D',
      mark:   '···',
      glow:   '0 0 20px rgba(245,158,11,0.3), inset 0 0 20px rgba(245,158,11,0.04)',
    },
    complete: {
      border: 'rgba(16,185,129,0.4)',
      leftBorder: '#10B981',
      bg:     'rgba(16,185,129,0.08)',
      dot:    '#10B981',
      lbl:    '#6EE7B7',
      mark:   '✓',
      glow:   '0 0 20px rgba(16,185,129,0.22)',
    },
    error: {
      border: 'rgba(244,63,94,0.4)',
      leftBorder: '#F43F5E',
      bg:     'rgba(244,63,94,0.09)',
      dot:    '#F43F5E',
      lbl:    '#FDA4AF',
      mark:   '✗',
      glow:   '0 0 20px rgba(244,63,94,0.3)',
    },
  }[status] || {
    border: 'rgba(255,255,255,0.07)', leftBorder: 'rgba(255,255,255,0.06)',
    bg: 'rgba(255,255,255,0.025)', dot: 'rgba(255,255,255,0.18)',
    lbl: 'rgba(255,255,255,0.28)', mark: null, glow: 'none',
  };

  return (
    <div
      className={status === 'running' ? 'pulse-amber' : ''}
      style={{
        display: 'flex', alignItems: 'center', gap: '7px',
        padding: '8px 10px', borderRadius: '10px',
        border: `1px solid ${C.border}`,
        borderLeft: `3px solid ${C.leftBorder}`,
        background: C.bg,
        boxShadow: C.glow,
        backdropFilter: 'blur(10px)',
        WebkitBackdropFilter: 'blur(10px)',
        transition: 'all .3s ease',
      }}
    >
      <div style={{
        width: '6px', height: '6px', borderRadius: '50%', flexShrink: 0,
        background: C.dot,
        boxShadow: status !== 'idle' ? `0 0 8px ${C.dot}` : 'none',
      }} />
      <span style={{ fontSize: '12px', lineHeight: 1 }}>{agent.icon}</span>
      <span style={{ fontSize: '11px', fontFamily: "'JetBrains Mono', monospace", fontWeight: 600, color: C.lbl, letterSpacing: '.04em' }}>
        {agent.label}
      </span>
      {C.mark && (
        <span style={{ marginLeft: 'auto', fontSize: '11px', fontFamily: "'JetBrains Mono', monospace", color: C.lbl }}>
          {C.mark}
        </span>
      )}
    </div>
  );
}

/* ── Decision log row ────────────────────────────────────────────────────── */
function LogRow({ entry }) {
  return (
    <div className="slide-in" style={{
      background: 'rgba(255,255,255,0.03)',
      border: '1px solid rgba(255,255,255,0.06)',
      borderLeft: '3px solid rgba(245,158,11,0.35)',
      borderRadius: '10px',
      padding: '10px 14px',
      marginBottom: '8px',
    }}>
      <div style={{ color: 'rgba(255,255,255,0.28)', fontSize: '10px', marginBottom: '4px', fontFamily: "'JetBrains Mono', monospace" }}>
        {entry.ts}
      </div>
      <div style={{ color: 'rgba(255,255,255,0.78)', fontSize: '12px', lineHeight: '1.6', fontFamily: "'JetBrains Mono', monospace" }}>
        {entry.text}
      </div>
      {entry.badge && (
        <span style={{
          display: 'inline-block', marginTop: '6px', padding: '2px 10px',
          borderRadius: '999px', fontSize: '10px', fontFamily: "'JetBrains Mono', monospace",
          background: entry.bg || 'rgba(255,255,255,0.06)',
          color:      entry.fg || 'rgba(255,255,255,0.45)',
          border:     `1px solid ${entry.bd || 'rgba(255,255,255,0.1)'}`,
        }}>
          {entry.badge}
        </span>
      )}
    </div>
  );
}

/* ── WhatsApp phone mockup ───────────────────────────────────────────────── */
function PhoneMockup({ message }) {
  return (
    <div className="fade-up" style={{
      margin: '16px auto 0', width: '218px',
      background: 'rgba(10,13,20,0.92)',
      backdropFilter: 'blur(20px)',
      WebkitBackdropFilter: 'blur(20px)',
      borderRadius: '28px',
      border: '1.5px solid rgba(255,255,255,0.1)',
      padding: '12px',
      animation: 'phoneGlow 3s ease-in-out infinite',
    }}>
      {/* Status bar */}
      <div style={{ display: 'flex', justifyContent: 'space-between', padding: '2px 8px 6px', opacity: .45 }}>
        <span style={{ color: '#9ca3af', fontSize: '10px', fontFamily: "'JetBrains Mono', monospace" }}>9:41</span>
        <span style={{ color: '#9ca3af', fontSize: '10px' }}>●●●</span>
      </div>
      {/* WhatsApp header */}
      <div style={{ background: '#075E54', borderRadius: '12px 12px 0 0', padding: '10px 12px', display: 'flex', alignItems: 'center', gap: '9px' }}>
        <div style={{
          width: '28px', height: '28px', borderRadius: '50%',
          background: 'linear-gradient(135deg, #25D366, #128C7E)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: '10px', fontWeight: 700, color: '#fff',
          boxShadow: '0 0 14px rgba(37,211,102,0.45)',
        }}>PB</div>
        <div>
          <div style={{ color: '#fff', fontSize: '12px', fontWeight: 600, fontFamily: "'Outfit', sans-serif" }}>PlanB AI</div>
          <div style={{ color: '#a7f3d0', fontSize: '9px', fontFamily: "'JetBrains Mono', monospace" }}>online</div>
        </div>
      </div>
      {/* Chat area */}
      <div style={{ background: '#0d1a14', padding: '10px', borderRadius: '0 0 12px 12px' }}>
        <div style={{ background: '#1a2e20', borderRadius: '4px 12px 12px 12px', padding: '10px 12px' }}>
          <p style={{ color: '#e2e8f0', fontSize: '11px', lineHeight: '1.6', whiteSpace: 'pre-wrap', margin: 0, fontFamily: '-apple-system, sans-serif' }}>
            {message}
          </p>
          <p style={{ color: 'rgba(107,114,128,0.75)', fontSize: '9px', margin: '5px 0 0', textAlign: 'right', fontFamily: "'JetBrains Mono', monospace" }}>
            just now ✓✓
          </p>
        </div>
      </div>
      {/* Home bar */}
      <div style={{ width: '42px', height: '3px', background: 'rgba(255,255,255,0.14)', borderRadius: '2px', margin: '10px auto 2px' }} />
    </div>
  );
}

/* ── Stats card ──────────────────────────────────────────────────────────── */
function StatCard({ label, value, gradClass, icon }) {
  return (
    <div style={{
      flex: 1,
      background: 'rgba(255,255,255,0.04)',
      backdropFilter: 'blur(20px)',
      WebkitBackdropFilter: 'blur(20px)',
      border: '1px solid rgba(255,255,255,0.08)',
      borderRadius: '14px',
      padding: '18px 14px',
      textAlign: 'center',
    }}>
      {icon && <div style={{ fontSize: '20px', marginBottom: '8px' }}>{icon}</div>}
      <div className={`grad-${gradClass}`} style={{ fontSize: '28px', fontWeight: 800, fontFamily: "'Outfit', sans-serif", lineHeight: 1.1 }}>
        {value}
      </div>
      <div style={{ fontSize: '9px', color: 'rgba(255,255,255,0.28)', marginTop: '7px', textTransform: 'uppercase', letterSpacing: '.12em', fontFamily: "'JetBrains Mono', monospace" }}>
        {label}
      </div>
    </div>
  );
}

/* ── Calendar event card ─────────────────────────────────────────────────── */
function CalEvent({ title, time, color, tag }) {
  const HEX = { amber:'#F59E0B', emerald:'#10B981', indigo:'#6366F1', rose:'#F43F5E' };
  const RGB  = { amber:'245,158,11', emerald:'16,185,129', indigo:'99,102,241', rose:'244,63,94' };
  const c = HEX[color] || HEX.indigo;
  const r = RGB[color]  || RGB.indigo;

  return (
    <div className="cal-card" style={{ borderLeft: `3px solid ${c}` }}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: '8px' }}>
        <span style={{ color: 'rgba(255,255,255,0.82)', fontSize: '12px', fontWeight: 600, fontFamily: "'Outfit', sans-serif", lineHeight: 1.35 }}>
          {title}
        </span>
        {tag && (
          <span style={{
            flexShrink: 0, fontSize: '9px', padding: '2px 8px', borderRadius: '999px',
            background: `rgba(${r},0.14)`, color: c,
            border: `1px solid rgba(${r},0.28)`,
            fontFamily: "'JetBrains Mono', monospace",
          }}>{tag}</span>
        )}
      </div>
      <div style={{ color: 'rgba(255,255,255,0.32)', fontSize: '10px', marginTop: '4px', fontFamily: "'JetBrains Mono', monospace" }}>
        {time}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   Main App
   ═══════════════════════════════════════════════════════════════════════════ */
function App() {
  const [statuses,    setStatuses]    = useState({ ...IDLE_STATE });
  const [log,         setLog]         = useState([]);
  const [isLive,      setIsLive]      = useState(false);
  const [lastRunId,   setLastRunId]   = useState(null);
  const [lastRunTs,   setLastRunTs]   = useState(null);
  const [waMsg,       setWaMsg]       = useState('');
  const [demoRunning, setDemoRunning] = useState(false);
  const [statusLine,  setStatusLine]  = useState('Polling /status every 3 s — waiting for first run...');
  const [stats,       setStats]       = useState({ runs: 0, avgConf: null, habits: 0, duration: null });
  const [calEvents,   setCalEvents]   = useState([]);

  const logRef      = useRef(null);
  const timeoutsRef = useRef([]);

  /* Auto-scroll log */
  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [log]);

  /* Clear animation queue */
  const clearAnim = () => { timeoutsRef.current.forEach(clearTimeout); timeoutsRef.current = []; };

  /* Sequential agent animation */
  const animate = useCallback((names) => {
    clearAnim();
    setStatuses({ ...IDLE_STATE });
    const seq = [...new Set(names)].filter(n => AGENT_IDS.has(n));
    let t = 0;
    seq.forEach(id => {
      const t1 = setTimeout(() => setStatuses(p => ({ ...p, [id]: 'running'  })), t);
      t += 580;
      const t2 = setTimeout(() => setStatuses(p => ({ ...p, [id]: 'complete' })), t);
      t += 140;
      timeoutsRef.current.push(t1, t2);
    });
    const tEnd = setTimeout(() => { setIsLive(false); setStatusLine('Pipeline complete ✓'); }, t + 350);
    timeoutsRef.current.push(tEnd);
  }, []);

  /* ── Log builder helpers ──────────────────────────────────────────────── */
  const push = useCallback((entries) => setLog(p => [...p, ...entries]), []);

  function makeRow(text, badge, pal) {
    return { id: uid(), ts: now(), text, badge: badge || null,
             bg: pal?.bg, fg: pal?.fg, bd: pal?.bd };
  }

  const logsFromDemo = useCallback((result) => {
    const dl = result.decision_log || {};
    const rows = [];

    rows.push(makeRow(`Disruption: "${dl.disruption || ''}"`, 'DEMO',
      { bg:'rgba(124,58,237,0.14)', fg:'#c084fc', bd:'rgba(124,58,237,0.3)' }));

    if (dl.severity)
      rows.push(makeRow(
        `Mode: ${dl.mode || '?'} · Severity: ${dl.severity} · Hours impacted: ${dl.hours_impacted ?? 'n/a'}`,
        dl.severity, SEV_PAL[dl.severity]));

    if (dl.context_summary)
      rows.push(makeRow(dl.context_summary, null));

    if (dl.decision_reasoning)
      rows.push(makeRow(`Orchestrator: ${dl.decision_reasoning}`, null));

    if (dl.delegation_depth)
      rows.push(makeRow(`Delegation depth: ${dl.delegation_depth}`, dl.delegation_depth,
        { bg:'rgba(255,255,255,0.06)', fg:'rgba(255,255,255,0.45)', bd:'rgba(255,255,255,0.1)' }));

    /* Confirmed schedule */
    const scheduleEvts = [];
    (dl.confirmed_schedule || []).forEach((item, i) => {
      const conf = (dl.confidence_scores || {})[item.task_name];
      const old  = fmtTime(item.old_time);
      const nw   = fmtTime(item.new_time);
      rows.push(makeRow(
        `📅 ${item.task_name}: ${old} → ${nw}${item.moved_to_tomorrow ? ' (→ tomorrow)' : ''}`,
        conf != null ? `${conf}% confidence` : 'moved',
        { bg:'rgba(16,185,129,0.12)', fg:'#4ade80', bd:'rgba(16,185,129,0.25)' }));
      scheduleEvts.push({
        id: `cal-${i}`, title: item.task_name,
        time: `${old} → ${nw}`,
        color: item.moved_to_tomorrow ? 'rose' : 'emerald',
        tag:   item.moved_to_tomorrow ? 'tomorrow' : 'today',
      });
    });
    if (scheduleEvts.length) setCalEvents(scheduleEvts);

    /* Routine decisions + streak protection */
    Object.entries(dl.routine_decisions || {}).forEach(([name, d]) => {
      if (d.streak_protected) {
        rows.push(makeRow(
          `🔥 Streak protected: ${name} kept (dropped ${d.drop_count || 0}× in 3 days)`,
          'protected', { bg:'rgba(249,115,22,0.12)', fg:'#fdba74', bd:'rgba(249,115,22,0.28)' }));
      } else if (d.decision) {
        rows.push(makeRow(
          `${name}: ${d.decision}${d.reason ? ' — ' + d.reason : ''}`,
          d.decision, DEC_PAL[d.decision]));
      }
    });

    /* Emails */
    const emails = dl.emails_sent || [];
    if (emails.length)
      rows.push(makeRow(
        `📧 ${emails.length} reschedule email${emails.length > 1 ? 's' : ''} staged`,
        `${emails.length} email${emails.length > 1 ? 's' : ''}`,
        { bg:'rgba(99,102,241,0.12)', fg:'#93c5fd', bd:'rgba(99,102,241,0.28)' }));

    return rows;
  }, []);

  const logsFromStatus = useCallback((data) => {
    const dec  = data.decisions || {};
    const rows = [];

    rows.push(makeRow(
      `Run detected · mode: ${data.mode || '?'} · severity: ${dec.severity || 'n/a'}`,
      data.mode || 'run',
      { bg:'rgba(255,255,255,0.06)', fg:'rgba(255,255,255,0.4)', bd:'rgba(255,255,255,0.12)' }));

    if (dec.context_summary)    rows.push(makeRow(dec.context_summary, null));
    if (dec.decision_reasoning) rows.push(makeRow(`Orchestrator: ${dec.decision_reasoning}`, null));

    (dec.confirmed_schedule || []).forEach(item => {
      const conf = (dec.confidence_scores || {})[item.task_name];
      rows.push(makeRow(
        `📅 ${item.task_name}: ${fmtTime(item.old_time)} → ${fmtTime(item.new_time)}`,
        conf != null ? `${conf}%` : null,
        { bg:'rgba(16,185,129,0.12)', fg:'#4ade80', bd:'rgba(16,185,129,0.25)' }));
    });

    Object.entries(dec.routine_decisions || {}).forEach(([name, d]) => {
      if (d.streak_protected)
        rows.push(makeRow(`🔥 Streak protected: ${name}`, 'protected',
          { bg:'rgba(249,115,22,0.12)', fg:'#fdba74', bd:'rgba(249,115,22,0.28)' }));
      else if (d.decision)
        rows.push(makeRow(`${name}: ${d.decision}`, d.decision, DEC_PAL[d.decision]));
    });

    return rows;
  }, []);

  /* ── Poll /status ─────────────────────────────────────────────────────── */
  useEffect(() => {
    let alive = true;
    const poll = async () => {
      if (!alive || demoRunning) return;
      try {
        const r    = await fetch(`${API_BASE}/status`, { signal: AbortSignal.timeout(5000) });
        if (!r.ok) { setStatusLine('Server unreachable — retrying...'); return; }
        const data = await r.json();
        if (!alive) return;

        if (data.status === 'idle') { setStatusLine('Polling /status — no active run'); return; }

        if (data.run_id && data.run_id !== lastRunId) {
          setLastRunId(data.run_id);
          setLastRunTs(data.timestamp || now());
          setIsLive(true);
          setStatusLine(`New run: ${data.run_id.slice(0, 8)}…`);
          const agents = (data.agents || []).filter(Boolean);
          animate(agents.length ? agents : ['monitor','context','resilience','priority','orchestrator','comms']);
          push(logsFromStatus(data));
          setStats(p => ({ ...p, runs: p.runs + 1 }));
        }
      } catch { /* server unreachable */ }
    };
    const iv = setInterval(poll, 3000);
    poll();
    return () => { alive = false; clearInterval(iv); };
  }, [lastRunId, demoRunning, animate, push, logsFromStatus]);

  /* ── Trigger demo ─────────────────────────────────────────────────────── */
  const handleDemo = async () => {
    if (demoRunning) return;
    setDemoRunning(true);
    setIsLive(true);
    setWaMsg('');
    setStatusLine('⚡ Demo pipeline running…');

    /* Optimistic animation while we wait for the server */
    animate(['monitor','context','resilience','priority','orchestrator','replan','routine','scheduler','comms']);

    try {
      const r      = await fetch(`${API_BASE}/demo`, { method: 'POST', signal: AbortSignal.timeout(120000) });
      const result = await r.json();
      if (result.status !== 'ok') throw new Error(result.error || 'non-ok status');

      /* Re-animate with actual agents fired */
      const actual = (result.agents_fired || []).filter(Boolean);
      setIsLive(true);
      animate(actual.length ? actual : ['monitor','context','resilience','priority','orchestrator','replan','routine','scheduler','comms']);

      setWaMsg(result.whatsapp_message || '');
      push(logsFromDemo(result));

      /* Compute stats */
      const dl     = result.decision_log || {};
      const scores = Object.values(dl.confidence_scores || {}).filter(v => typeof v === 'number');
      const habits = Object.values(dl.routine_decisions || {}).filter(d => d.streak_protected).length;

      setStats(p => ({ ...p, runs: p.runs + 1, avgConf: avg(scores), habits: p.habits + habits, duration: result.pipeline_duration_ms }));
      setLastRunTs(now());
      setStatusLine('Demo complete ✓');

    } catch (err) {
      setStatusLine(`Error: ${err.message}`);
      setIsLive(false);
      setStatuses(p => Object.fromEntries(
        Object.entries(p).map(([k, v]) => [k, v === 'running' ? 'error' : v])
      ));
    } finally {
      setDemoRunning(false);
    }
  };

  const handleReset = () => {
    clearAnim();
    setStatuses({ ...IDLE_STATE });
    setLog([]);
    setWaMsg('');
    setCalEvents([]);
    setIsLive(false);
    setStatusLine('Polling /status every 3 s — waiting for first run...');
  };

  const completeCount = Object.values(statuses).filter(s => s === 'complete').length;
  const totalAgents   = AGENTS.length;

  /* Placeholder calendar events when no demo has run yet */
  const displayCal = calEvents.length > 0 ? calEvents : [
    { id:'p1', title:'Morning Briefing',  time:'7:00 AM – 7:15 AM',   color:'indigo',  tag:'today'    },
    { id:'p2', title:'Team Standup',      time:'9:30 AM – 9:45 AM',   color:'amber',   tag:'today'    },
    { id:'p3', title:'Deep Work Block',   time:'10:00 AM – 12:00 PM', color:'emerald', tag:'today'    },
    { id:'p4', title:'Client Review',     time:'2:30 PM – 3:30 PM',   color:'rose',    tag:'tomorrow' },
  ];

  /* ── Render ───────────────────────────────────────────────────────────── */
  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>

      {/* ── Glass Navbar ──────────────────────────────────────────────── */}
      <div className="glass-navbar" style={{ position: 'sticky', top: 0, zIndex: 100, padding: '14px 22px', overflow: 'hidden' }}>
        {/* Progress bar (rainbow strip at bottom of navbar) */}
        {demoRunning && (
          <div className="progress-rainbow" style={{ position: 'absolute', bottom: 0, left: 0, right: 0 }} />
        )}

        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          {/* Brand */}
          <div style={{ display: 'flex', alignItems: 'center', gap: '13px' }}>
            <div style={{
              width: '38px', height: '38px', borderRadius: '11px',
              background: 'linear-gradient(135deg, #B45309 0%, #F59E0B 100%)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: '20px', boxShadow: '0 0 22px rgba(245,158,11,0.45)',
              flexShrink: 0,
            }}>🗓</div>
            <div>
              <h1 style={{ fontSize: '20px', fontWeight: 800, fontFamily: "'Outfit', sans-serif", color: '#fff', letterSpacing: '.01em', lineHeight: 1.1 }}>
                Plan<span style={{ color: '#F59E0B' }}>B</span>
              </h1>
              <div style={{ fontSize: '9px', color: 'rgba(255,255,255,0.28)', fontFamily: "'JetBrains Mono', monospace", letterSpacing: '.1em', marginTop: '1px' }}>
                MISSION CONTROL · NEOVERSE 26
              </div>
            </div>
          </div>

          {/* Right: live badge + status */}
          <div style={{ display: 'flex', alignItems: 'center', gap: '16px' }}>
            {isLive && (
              <div style={{
                display: 'flex', alignItems: 'center', gap: '6px',
                background: 'rgba(244,63,94,0.1)', border: '1px solid rgba(244,63,94,0.22)',
                padding: '4px 13px', borderRadius: '999px',
              }}>
                <div className="blink-red" style={{ width: '7px', height: '7px', borderRadius: '50%', background: '#F43F5E', boxShadow: '0 0 8px #F43F5E' }} />
                <span style={{ color: '#F43F5E', fontSize: '11px', fontWeight: 700, letterSpacing: '.1em', fontFamily: "'JetBrains Mono', monospace" }}>LIVE</span>
              </div>
            )}
            <div style={{ textAlign: 'right' }}>
              <div style={{ color: 'rgba(255,255,255,0.55)', fontSize: '11px', fontFamily: "'JetBrains Mono', monospace" }}>
                {lastRunTs ? `Last: ${lastRunTs}` : 'Awaiting run'}
              </div>
              <div style={{ color: 'rgba(255,255,255,0.22)', fontSize: '10px', fontFamily: "'JetBrains Mono', monospace", marginTop: '1px' }}>
                {statusLine}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* ── Page body ─────────────────────────────────────────────────── */}
      <div style={{ padding: '20px 22px 28px', display: 'flex', flexDirection: 'column', gap: '16px', flex: 1 }}>

        {/* ── Stats bar ──────────────────────────────────────────────── */}
        <div style={{ display: 'flex', gap: '12px' }}>
          <StatCard label="Pipeline Runs Today" value={stats.runs}                                         gradClass="amber"   icon="⚡" />
          <StatCard label="Avg Confidence"       value={stats.avgConf != null ? `${stats.avgConf}%` : '—'} gradClass="emerald" icon="🎯" />
          <StatCard label="Habits Protected"     value={stats.habits}                                       gradClass="indigo"  icon="🔥" />
          <StatCard label="Last Run Duration"    value={fmtDuration(stats.duration)}                       gradClass="rose"    icon="⏱" />
        </div>

        {/* ── Two-column body ────────────────────────────────────────── */}
        <div style={{ display: 'flex', gap: '16px', alignItems: 'flex-start' }}>

          {/* ── LEFT: Agent pipeline + controls + phone ─────────────── */}
          <div style={{ width: '336px', flexShrink: 0, display: 'flex', flexDirection: 'column', gap: '12px' }}>

            {/* Agent pipeline glass panel */}
            <div className="glass" style={{ padding: '16px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                <span style={{ color: '#F59E0B', fontSize: '10px', fontWeight: 700, letterSpacing: '.12em', textTransform: 'uppercase', fontFamily: "'JetBrains Mono', monospace" }}>
                  Agent Pipeline
                </span>
                <span style={{ color: 'rgba(255,255,255,0.25)', fontSize: '10px', fontFamily: "'JetBrains Mono', monospace" }}>
                  {completeCount}/{totalAgents}
                </span>
              </div>

              {/* 2-column agent grid */}
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '6px' }}>
                {AGENTS.map(a => <AgentCard key={a.id} agent={a} status={statuses[a.id]} />)}
              </div>

              {/* Progress bar (inside panel, while running) */}
              {demoRunning && (
                <div style={{ marginTop: '14px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '5px' }}>
                    <span style={{ fontSize: '10px', color: 'rgba(255,255,255,0.28)', fontFamily: "'JetBrains Mono', monospace" }}>Progress</span>
                    <span style={{ fontSize: '10px', color: '#F59E0B', fontFamily: "'JetBrains Mono', monospace" }}>
                      {Math.round((completeCount / totalAgents) * 100)}%
                    </span>
                  </div>
                  <div style={{ height: '3px', background: 'rgba(255,255,255,0.07)', borderRadius: '999px', overflow: 'hidden' }}>
                    <div style={{
                      height: '100%', borderRadius: '999px',
                      width: `${(completeCount / totalAgents) * 100}%`,
                      background: 'linear-gradient(90deg, #6366F1, #F59E0B, #10B981)',
                      transition: 'width .35s ease',
                    }} />
                  </div>
                </div>
              )}
            </div>

            {/* Buttons */}
            <div style={{ display: 'flex', gap: '8px' }}>
              <button
                onClick={handleDemo}
                disabled={demoRunning}
                className="btn-demo"
                style={{ flex: 1, padding: '12px 16px', borderRadius: '12px', fontSize: '12px' }}
              >
                {demoRunning ? '⚡ RUNNING…' : '⚡ TRIGGER DEMO'}
              </button>
              <button
                onClick={handleReset}
                className="btn-reset"
                style={{ padding: '12px 16px', borderRadius: '12px' }}
              >
                RESET
              </button>
            </div>

            {/* WhatsApp phone mockup */}
            {waMsg && <PhoneMockup message={waMsg} />}
          </div>

          {/* ── RIGHT: Decision log + calendar ──────────────────────── */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: '12px', minWidth: 0 }}>

            {/* Decision log glass panel */}
            <div className="glass" style={{ padding: '16px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                <span style={{ color: '#F59E0B', fontSize: '10px', fontWeight: 700, letterSpacing: '.12em', textTransform: 'uppercase', fontFamily: "'JetBrains Mono', monospace" }}>
                  Decision Log
                </span>
                <span style={{ color: 'rgba(255,255,255,0.25)', fontSize: '10px', fontFamily: "'JetBrains Mono', monospace" }}>
                  {log.length} entries
                </span>
              </div>

              <div ref={logRef} style={{ overflowY: 'auto', maxHeight: '360px', paddingRight: '2px' }}>
                {log.length === 0 ? (
                  <div style={{ textAlign: 'center', paddingTop: '52px', paddingBottom: '52px', userSelect: 'none' }}>
                    <div style={{ fontSize: '48px', marginBottom: '14px', filter: 'grayscale(0.2) opacity(0.6)' }}>🎯</div>
                    <div style={{ color: 'rgba(255,255,255,0.2)', fontSize: '13px', fontFamily: "'Outfit', sans-serif" }}>No pipeline runs yet.</div>
                    <div style={{ color: 'rgba(255,255,255,0.1)', fontSize: '11px', marginTop: '7px', fontFamily: "'JetBrains Mono', monospace" }}>
                      Hit <span style={{ color: '#F59E0B' }}>TRIGGER DEMO</span> or wait for live data.
                    </div>
                  </div>
                ) : (
                  log.map(e => <LogRow key={e.id} entry={e} />)
                )}
              </div>
            </div>

            {/* Calendar panel */}
            <div className="glass" style={{ padding: '16px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                <span style={{ color: '#6366F1', fontSize: '10px', fontWeight: 700, letterSpacing: '.12em', textTransform: 'uppercase', fontFamily: "'JetBrains Mono', monospace" }}>
                  📅 Calendar Events
                </span>
                <span style={{ color: 'rgba(255,255,255,0.25)', fontSize: '10px', fontFamily: "'JetBrains Mono', monospace" }}>
                  Today / Tomorrow
                </span>
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '8px' }}>
                {displayCal.map(e => <CalEvent key={e.id} title={e.title} time={e.time} color={e.color} tag={e.tag} />)}
              </div>
            </div>
          </div>
        </div>

        {/* ── What is PlanB explainer ────────────────────────────────── */}
        <div className="glass" style={{ padding: '22px 26px' }}>
          <div style={{ marginBottom: '12px' }}>
            <span style={{ color: 'rgba(255,255,255,0.4)', fontSize: '10px', fontWeight: 700, letterSpacing: '.14em', textTransform: 'uppercase', fontFamily: "'JetBrains Mono', monospace" }}>
              What is PlanB?
            </span>
          </div>
          <p style={{ color: 'rgba(255,255,255,0.5)', fontSize: '13px', lineHeight: '1.75', fontFamily: "'Outfit', sans-serif", maxWidth: '780px', marginBottom: '16px' }}>
            PlanB is an autonomous AI scheduling assistant that operates entirely through{' '}
            <strong style={{ color: '#25D366' }}>WhatsApp</strong>. When disruptions hit — a cancelled meeting,
            a traffic jam, an urgent email — 14 LangGraph agents detect them, re-evaluate your entire day,
            reschedule via Google Calendar, draft rescheduling emails via AWS SES, and send you a plain-text
            summary. No app to open. No manual rescheduling.
          </p>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '8px' }}>
            {[
              { label:'disruption_response',  color:'#F43F5E' },
              { label:'morning_briefing',      color:'#F59E0B' },
              { label:'evening_review',        color:'#6366F1' },
              { label:'crisis_mode',           color:'#ef4444' },
              { label:'habit_protection',      color:'#10B981' },
              { label:'proactive_risk_scan',   color:'#a78bfa' },
            ].map(m => (
              <span key={m.label} style={{
                display: 'inline-block', padding: '4px 13px', borderRadius: '999px',
                fontSize: '11px', fontFamily: "'JetBrains Mono', monospace", fontWeight: 600,
                background: `${m.color}18`, color: m.color, border: `1px solid ${m.color}30`,
              }}>
                {m.label}
              </span>
            ))}
          </div>
        </div>

        {/* ── Footer ────────────────────────────────────────────────── */}
        <div style={{ textAlign: 'center', color: 'rgba(255,255,255,0.1)', fontSize: '10px', letterSpacing: '.07em', fontFamily: "'JetBrains Mono', monospace" }}>
          PlanB · NeoVerse 26 Hackathon · polling {API_BASE || 'same-origin'}/status every 3 s
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
