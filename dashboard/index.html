<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlanB — Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: #08090d;
      color: #cfd1d6;
      font-family: 'Inter', sans-serif
    }

    :root {
      --bg: #08090d;
      --surface: #0f1117;
      --border: #1a1c24;
      --text: #cfd1d6;
      --text-dim: #5a5d66;
      --text-bright: #f0f1f3;
      --accent-blue: #4ea8de;
      --accent-cyan: #22d3ee;
      --accent-green: #34d399;
      --accent-amber: #fbbf24;
      --accent-rose: #fb7185;
      --accent-purple: #a78bfa;
      --accent-orange: #fb923c;
      --glow-blue: rgba(78, 168, 222, 0.35);
      --glow-cyan: rgba(34, 211, 238, 0.35);
    }

    #root {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column
    }

    /* ── Top bar ── */
    .topbar {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      z-index: 20
    }

    .topbar h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--text-bright)
    }

    .topbar h1 span {
      color: var(--accent-cyan)
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px
    }

    .status-pill {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 3px 10px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      letter-spacing: .06em
    }

    /* ── Main layout ── */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 220px 1fr 300px;
      height: calc(100vh - 48px);
      overflow: hidden
    }

    /* ── Left panel ── */
    .left-panel {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .panel-header {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-dim);
      padding: 16px 16px 8px;
      font-weight: 600
    }

    .task-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 12px
    }

    .task-item {
      padding: 10px 12px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-dim);
      border-left: 2px solid transparent;
      transition: all .15s;
      margin-bottom: 2px
    }

    .task-item:hover {
      background: rgba(255, 255, 255, .03);
      color: var(--text)
    }

    .task-item.active {
      border-left-color: var(--accent-cyan);
      color: var(--text-bright);
      background: rgba(34, 211, 238, .05)
    }

    .task-item .task-mode {
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
      margin-top: 3px
    }

    .task-item.active .task-mode {
      color: var(--accent-cyan)
    }

    /* ── Left panel controls ── */
    .controls {
      padding: 12px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .ctrl-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: .06em;
      transition: all .12s
    }

    .ctrl-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, .06);
      border-color: var(--text-dim)
    }

    .ctrl-btn:disabled {
      opacity: .3;
      cursor: not-allowed
    }

    .ctrl-btn.accent {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan)
    }

    .ctrl-btn.accent:hover:not(:disabled) {
      background: rgba(34, 211, 238, .1)
    }

    .ctrl-btn.alert {
      border-color: var(--accent-rose);
      color: var(--accent-rose)
    }

    .ctrl-btn.alert:hover:not(:disabled) {
      background: rgba(251, 113, 133, .1)
    }

    /* ── Center canvas ── */
    .center {
      position: relative;
      overflow: hidden;
      background: var(--bg)
    }

    .center canvas {
      display: block;
      width: 100%;
      height: 100%
    }

    /* ── Task header overlay ── */
    .task-overlay {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 10
    }

    .task-overlay h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-bright);
      letter-spacing: .3px
    }

    .task-overlay .task-status {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 4px;
      letter-spacing: .08em
    }

    .task-overlay .task-status.running {
      color: var(--accent-cyan)
    }

    .task-overlay .task-status.complete {
      color: var(--accent-green)
    }

    .task-overlay .task-status.idle {
      color: var(--text-dim)
    }

    /* ── Stats overlay ── */
    .stats-row {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 24px;
      pointer-events: none;
      z-index: 10
    }

    .stat-chip {
      text-align: center
    }

    .stat-chip .val {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-bright);
      font-family: 'JetBrains Mono', monospace
    }

    .stat-chip .lbl {
      font-size: 9px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 2px
    }

    /* ── Timeline ── */
    .timeline {
      position: absolute;
      bottom: 12px;
      left: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 0;
      z-index: 10;
      height: 32px
    }

    .tl-step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative
    }

    .tl-dot {
      width: 8px;
      height: 8px;
      border: 1.5px solid var(--border);
      background: transparent;
      transition: all .2s
    }

    .tl-dot.active {
      border-color: var(--accent-cyan);
      background: var(--accent-cyan);
      box-shadow: 0 0 8px var(--glow-cyan)
    }

    .tl-dot.done {
      border-color: var(--text-dim);
      background: var(--text-dim)
    }

    .tl-line {
      position: absolute;
      top: 3.5px;
      left: calc(50% + 5px);
      right: calc(-50% + 5px);
      height: 1px;
      background: var(--border)
    }

    .tl-line.active {
      background: var(--accent-cyan);
      box-shadow: 0 0 4px var(--glow-cyan)
    }

    .tl-line.done {
      background: var(--text-dim)
    }

    .tl-label {
      font-size: 7px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
      margin-top: 4px;
      white-space: nowrap;
      letter-spacing: .04em
    }

    .tl-label.active {
      color: var(--accent-cyan)
    }

    /* ── Right panel ── */
    .right-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .spotlight {
      flex: 1;
      overflow-y: auto;
      padding: 16px
    }

    .spot-header {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-dim);
      margin-bottom: 12px;
      font-weight: 600
    }

    .agent-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 4px
    }

    .agent-role {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.55;
      margin-bottom: 16px
    }

    .agent-section {
      margin-bottom: 16px
    }

    .agent-section-title {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-weight: 600
    }

    .action-item {
      font-size: 11px;
      color: var(--text);
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.5
    }

    .chip {
      display: inline-block;
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 8px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      margin: 2px 4px 2px 0;
      letter-spacing: .04em
    }

    /* ── Log panel at bottom of right ── */
    .log-panel {
      border-top: 1px solid var(--border);
      max-height: 220px;
      overflow-y: auto;
      padding: 12px 16px
    }

    .log-entry {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
      margin-bottom: 6px;
      line-height: 1.5
    }

    .log-entry .log-ts {
      color: var(--text-dim);
      opacity: .5;
      margin-right: 6px
    }

    .log-entry.highlight {
      color: var(--accent-cyan)
    }

    /* scrollbars */
    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border)
    }

    /* Legend */
    .legend {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      z-index: 10;
      pointer-events: none
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 8px;
      color: var(--text-dim);
      letter-spacing: .06em;
      text-transform: uppercase
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const API = new URLSearchParams(window.location.search).get('api') || 'http://localhost:8000';

    /* ═══════════════════════════════════════════════════════════════════════════
       AGENT DEFINITIONS — derived from graph.py
       ═══════════════════════════════════════════════════════════════════════════ */

    const AGENT_TYPES = {
      sensor: { color: '#4ea8de', label: 'Sensor' },
      reasoning: { color: '#a78bfa', label: 'Reasoning' },
      planning: { color: '#fbbf24', label: 'Planning' },
      action: { color: '#34d399', label: 'Action' },
      output: { color: '#fb7185', label: 'Output' },
      special: { color: '#fb923c', label: 'Special' },
    };

    const AGENTS = [
      { id: 'monitor', name: 'Monitor', type: 'sensor', desc: 'Detects disruptions from WhatsApp, Gmail, and webhooks. First responder.', short: 'MNTR' },
      { id: 'context', name: 'Context', type: 'sensor', desc: 'Loads calendar, user DNA, and situational context for decision-making.', short: 'CTXT' },
      { id: 'resilience', name: 'Resilience', type: 'reasoning', desc: 'Evaluates schedule stress, buffer time, and adaptive capacity.', short: 'RSLN' },
      { id: 'priority', name: 'Priority', type: 'reasoning', desc: 'Ranks tasks by urgency, importance, and user preferences.', short: 'PRTY' },
      { id: 'orchestrator', name: 'Orchestrator', type: 'reasoning', desc: 'Central brain. Decides which agents to dispatch based on disruption type.', short: 'ORCH' },
      { id: 'replan', name: 'Replan', type: 'planning', desc: 'Generates new schedule proposals when significant rescheduling is needed.', short: 'RPLN' },
      { id: 'routine', name: 'Routine', type: 'planning', desc: 'Protects daily habits and streaks. Decides what to keep vs drop.', short: 'RTNE' },
      { id: 'scheduler', name: 'Scheduler', type: 'action', desc: 'Writes changes to Google Calendar. Detects conflicts post-write.', short: 'SCHD' },
      { id: 'negotiate', name: 'Negotiate', type: 'action', desc: 'Drafts and sends reschedule emails via AWS SES to affected parties.', short: 'NEGO' },
      { id: 'comms', name: 'Comms', type: 'output', desc: 'Composes and sends the final WhatsApp summary to the user.', short: 'COMM' },
      { id: 'predictive_risk', name: 'Predictive', type: 'reasoning', desc: 'Scans upcoming schedule for potential risks and suggests pre-emptive changes.', short: 'PRED' },
      { id: 'crisis', name: 'Crisis', type: 'special', desc: 'Activates for high-severity emergencies. Clears the calendar aggressively.', short: 'CRIS' },
      { id: 'stress', name: 'Stress', type: 'special', desc: 'Detects user burnout signals and suggests lighter schedules.', short: 'STRS' },
      { id: 'undo', name: 'Undo', type: 'special', desc: 'Reverts previous scheduling changes when the user requests a rollback.', short: 'UNDO' },
      { id: 'lifestyle', name: 'Lifestyle', type: 'special', desc: 'Optimises schedule around wellness, meals, and personal time.', short: 'LIFE' },
      { id: 'onboarding', name: 'Onboarding', type: 'special', desc: 'Welcomes new users and creates their initial profile and DNA.', short: 'ONBR' },
    ];

    const AGENT_MAP = Object.fromEntries(AGENTS.map(a => [a.id, a]));

    /* Graph edges from graph.py */
    const EDGES = [
      ['monitor', 'context'], ['monitor', 'onboarding'],
      ['context', 'resilience'], ['resilience', 'priority'], ['priority', 'orchestrator'],
      ['orchestrator', 'replan'], ['orchestrator', 'predictive_risk'], ['orchestrator', 'crisis'],
      ['orchestrator', 'undo'], ['orchestrator', 'stress'], ['orchestrator', 'lifestyle'],
      ['orchestrator', 'scheduler'], ['orchestrator', 'comms'],
      ['replan', 'routine'], ['routine', 'scheduler'],
      ['scheduler', 'negotiate'], ['scheduler', 'comms'],
      ['negotiate', 'comms'], ['predictive_risk', 'comms'], ['crisis', 'comms'],
      ['undo', 'comms'], ['stress', 'comms'], ['lifestyle', 'comms'], ['onboarding', 'comms'],
    ];

    /* Pre-defined task/scenario paths */
    const TASKS = [
      { id: 'disruption', name: 'Disruption Response', mode: 'disruption_response', path: ['monitor', 'context', 'resilience', 'priority', 'orchestrator', 'replan', 'routine', 'scheduler', 'negotiate', 'comms'], status: 'idle' },
      { id: 'morning', name: 'Morning Briefing', mode: 'morning_briefing', path: ['monitor', 'context', 'resilience', 'priority', 'orchestrator', 'predictive_risk', 'comms'], status: 'idle' },
      { id: 'crisis', name: 'Crisis Mode', mode: 'crisis', path: ['monitor', 'context', 'resilience', 'priority', 'orchestrator', 'crisis', 'comms'], status: 'idle' },
      { id: 'evening', name: 'Evening Review', mode: 'evening_review', path: ['monitor', 'context', 'resilience', 'priority', 'orchestrator', 'replan', 'routine', 'scheduler', 'comms'], status: 'idle' },
      { id: 'stress', name: 'Stress Detection', mode: 'stress', path: ['monitor', 'context', 'resilience', 'priority', 'orchestrator', 'stress', 'comms'], status: 'idle' },
      { id: 'undo', name: 'Undo / Rollback', mode: 'undo', path: ['monitor', 'context', 'resilience', 'priority', 'orchestrator', 'undo', 'comms'], status: 'idle' },
      { id: 'risk', name: 'Proactive Risk Scan', mode: 'proactive_risk', path: ['monitor', 'context', 'resilience', 'priority', 'orchestrator', 'predictive_risk', 'comms'], status: 'idle' },
      { id: 'onboard', name: 'New User Onboarding', mode: 'onboarding', path: ['monitor', 'onboarding', 'comms'], status: 'idle' },
    ];

    /* ═══════════════════════════════════════════════════════════════════════════
       GRAPH LAYOUT — circular galaxy positions for each agent
       ═══════════════════════════════════════════════════════════════════════════ */

    function computePositions(cx, cy, agents) {
      // Inner ring: core pipeline (monitor→context→resilience→priority→orch→comms)
      // Outer ring: specialist agents
      const core = ['monitor', 'context', 'resilience', 'priority', 'orchestrator', 'comms'];
      const specialists = agents.filter(a => !core.includes(a.id)).map(a => a.id);

      const pos = {};
      const innerR = Math.min(cx, cy) * 0.32;
      const outerR = Math.min(cx, cy) * 0.62;

      core.forEach((id, i) => {
        const angle = -Math.PI / 2 + (i / core.length) * 2 * Math.PI;
        pos[id] = { x: cx + Math.cos(angle) * innerR, y: cy + Math.sin(angle) * innerR };
      });

      specialists.forEach((id, i) => {
        const angle = -Math.PI / 2 + (i / specialists.length) * 2 * Math.PI + 0.3;
        pos[id] = { x: cx + Math.cos(angle) * outerR, y: cy + Math.sin(angle) * outerR };
      });

      return pos;
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       HELPERS
       ═══════════════════════════════════════════════════════════════════════════ */
    let _uid = 0;
    const uid = () => `e${++_uid}-${Date.now()}`;
    const now = () => new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    function fmtDuration(ms) { return ms >= 1000 ? `${(ms / 1000).toFixed(1)}s` : `${ms}ms`; }
    function fmtTime(iso) {
      if (!iso) return '?';
      try { return new Date(iso).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata' }); }
      catch { return iso; }
    }

    /* ═══════════════════════════════════════════════════════════════════════════
       CANVAS RENDERER — draws the galaxy graph
       ═══════════════════════════════════════════════════════════════════════════ */

    function drawGraph(ctx, w, h, positions, agentStates, activePath, hoveredAgent, selectedAgent, particles, time) {
      ctx.clearRect(0, 0, w, h);

      // Subtle grid
      ctx.strokeStyle = 'rgba(255,255,255,.015)';
      ctx.lineWidth = 1;
      for (let x = 0; x < w; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
      for (let y = 0; y < h; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

      const activeSet = new Set(activePath || []);
      const activeEdges = new Set();
      if (activePath) {
        for (let i = 0; i < activePath.length - 1; i++) {
          activeEdges.add(`${activePath[i]}->${activePath[i + 1]}`);
        }
      }

      // Draw edges
      EDGES.forEach(([from, to]) => {
        const p1 = positions[from];
        const p2 = positions[to];
        if (!p1 || !p2) return;

        const edgeKey = `${from}->${to}`;
        const isActive = activeEdges.has(edgeKey);
        const isHovered = hoveredAgent && (from === hoveredAgent || to === hoveredAgent);

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);

        if (isActive) {
          ctx.strokeStyle = 'rgba(34,211,238,0.4)';
          ctx.lineWidth = 1.5;
          ctx.shadowColor = 'rgba(34,211,238,0.3)';
          ctx.shadowBlur = 6;
        } else if (isHovered) {
          ctx.strokeStyle = 'rgba(255,255,255,0.15)';
          ctx.lineWidth = 1;
          ctx.shadowBlur = 0;
        } else {
          ctx.strokeStyle = 'rgba(255,255,255,.04)';
          ctx.lineWidth = 0.5;
          ctx.shadowBlur = 0;
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Arrow head
        if (isActive || isHovered) {
          const dx = p2.x - p1.x;
          const dy = p2.y - p1.y;
          const len = Math.sqrt(dx * dx + dy * dy);
          const nx = dx / len, ny = dy / len;
          const midX = (p1.x + p2.x) / 2;
          const midY = (p1.y + p2.y) / 2;
          const arrowSize = 5;
          ctx.beginPath();
          ctx.moveTo(midX + nx * arrowSize, midY + ny * arrowSize);
          ctx.lineTo(midX - nx * arrowSize - ny * arrowSize * 0.6, midY - ny * arrowSize + nx * arrowSize * 0.6);
          ctx.lineTo(midX - nx * arrowSize + ny * arrowSize * 0.6, midY - ny * arrowSize - nx * arrowSize * 0.6);
          ctx.closePath();
          ctx.fillStyle = isActive ? 'rgba(34,211,238,0.6)' : 'rgba(255,255,255,0.15)';
          ctx.fill();
        }
      });

      // Draw particles on active edges
      if (activePath && particles) {
        particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(34,211,238,${p.alpha})`;
          ctx.shadowColor = 'rgba(34,211,238,0.6)';
          ctx.shadowBlur = 8;
          ctx.fill();
          ctx.shadowBlur = 0;
        });
      }

      // Draw nodes
      AGENTS.forEach(agent => {
        const pos = positions[agent.id];
        if (!pos) return;

        const state = agentStates[agent.id] || 'idle';
        const isOnPath = activeSet.has(agent.id);
        const isHov = hoveredAgent === agent.id;
        const isSel = selectedAgent === agent.id;
        const typeColor = AGENT_TYPES[agent.type]?.color || '#fff';

        // Node size
        let radius = 18;
        if (isSel) radius = 24;
        else if (isHov) radius = 22;

        // Breathing glow for idle
        const breathe = Math.sin(time * 0.002 + AGENTS.indexOf(agent) * 0.7) * 0.3 + 0.7;

        // Outer glow
        if (state === 'running' || state === 'complete' || isOnPath) {
          const glowColor = state === 'running' ? 'rgba(34,211,238,0.3)'
            : state === 'complete' ? 'rgba(52,211,153,0.2)'
              : 'rgba(34,211,238,0.1)';
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, radius + 8, 0, Math.PI * 2);
          ctx.fillStyle = glowColor;
          ctx.shadowColor = glowColor;
          ctx.shadowBlur = state === 'running' ? 20 : 10;
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        // Main circle
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);

        let fillAlpha = 0.08;
        let strokeColor = typeColor;
        let strokeAlpha = 0.3;

        if (state === 'running') {
          fillAlpha = 0.25; strokeAlpha = 1;
        } else if (state === 'complete') {
          fillAlpha = 0.12; strokeAlpha = 0.5;
        } else if (isOnPath) {
          fillAlpha = 0.1; strokeAlpha = 0.6;
        } else if (isHov || isSel) {
          fillAlpha = 0.15; strokeAlpha = 0.7;
        } else {
          strokeAlpha = breathe * 0.2;
          fillAlpha = 0.03;
        }

        ctx.fillStyle = typeColor.replace(')', `,${fillAlpha})`).replace('rgb', 'rgba');
        ctx.fill();
        ctx.strokeStyle = typeColor.replace(')', `,${strokeAlpha})`).replace('rgb', 'rgba');
        ctx.lineWidth = state === 'running' ? 2 : 1;
        ctx.stroke();

        // Inner pulse for running
        if (state === 'running') {
          const pulse = Math.sin(time * 0.006) * 0.3 + 0.5;
          ctx.beginPath();
          ctx.arc(pos.x, pos.y, radius * 0.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(34,211,238,${pulse})`;
          ctx.fill();
        }

        // Label
        const labelAlpha = (state === 'running' || isOnPath || isHov || isSel) ? 1 : 0.4;
        ctx.fillStyle = `rgba(240,241,243,${labelAlpha})`;
        ctx.font = `600 ${isSel ? 10 : 9}px 'JetBrains Mono', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(agent.short, pos.x, pos.y);

        // Name below
        if (isHov || isSel || state === 'running') {
          ctx.fillStyle = `rgba(240,241,243,0.7)`;
          ctx.font = "500 10px 'Inter', sans-serif";
          ctx.fillText(agent.name, pos.x, pos.y + radius + 14);
        }
      });
    }

    /* hex to rgb helper for canvas */
    (function () {
      const _origFill = CanvasRenderingContext2D.prototype;
    })();
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `${r},${g},${b}`;
    }

    // Patch: make typeColor work with rgba construction
    // We'll precompute rgb strings
    const AGENT_RGB = {};
    AGENTS.forEach(a => {
      AGENT_RGB[a.id] = hexToRgb(AGENT_TYPES[a.type].color);
    });

    function drawGraphPatched(ctx, w, h, positions, agentStates, activePath, hoveredAgent, selectedAgent, particles, time) {
      ctx.clearRect(0, 0, w, h);

      // Grid
      ctx.strokeStyle = 'rgba(255,255,255,.015)';
      ctx.lineWidth = 1;
      for (let x = 0; x < w; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
      for (let y = 0; y < h; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

      const activeSet = new Set(activePath || []);
      const activeEdges = new Set();
      if (activePath) {
        for (let i = 0; i < activePath.length - 1; i++) activeEdges.add(`${activePath[i]}->${activePath[i + 1]}`);
      }

      // Edges
      EDGES.forEach(([from, to]) => {
        const p1 = positions[from], p2 = positions[to];
        if (!p1 || !p2) return;
        const isActive = activeEdges.has(`${from}->${to}`);
        const isHovered = hoveredAgent && (from === hoveredAgent || to === hoveredAgent);

        ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
        if (isActive) { ctx.strokeStyle = 'rgba(34,211,238,0.35)'; ctx.lineWidth = 1.5; ctx.shadowColor = 'rgba(34,211,238,0.3)'; ctx.shadowBlur = 6; }
        else if (isHovered) { ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1; ctx.shadowBlur = 0; }
        else { ctx.strokeStyle = 'rgba(255,255,255,.035)'; ctx.lineWidth = 0.5; ctx.shadowBlur = 0; }
        ctx.stroke(); ctx.shadowBlur = 0;

        // Arrow
        if (isActive || isHovered) {
          const dx = p2.x - p1.x, dy = p2.y - p1.y, len = Math.sqrt(dx * dx + dy * dy);
          const nx = dx / len, ny = dy / len, mx = (p1.x + p2.x) / 2, my = (p1.y + p2.y) / 2, s = 5;
          ctx.beginPath();
          ctx.moveTo(mx + nx * s, my + ny * s);
          ctx.lineTo(mx - nx * s - ny * s * .6, my - ny * s + nx * s * .6);
          ctx.lineTo(mx - nx * s + ny * s * .6, my - ny * s - nx * s * .6);
          ctx.closePath();
          ctx.fillStyle = isActive ? 'rgba(34,211,238,0.55)' : 'rgba(255,255,255,.12)';
          ctx.fill();
        }
      });

      // Particles
      (particles || []).forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(34,211,238,${p.alpha})`;
        ctx.shadowColor = 'rgba(34,211,238,0.5)'; ctx.shadowBlur = 8; ctx.fill(); ctx.shadowBlur = 0;
      });

      // Nodes
      AGENTS.forEach((agent, idx) => {
        const pos = positions[agent.id]; if (!pos) return;
        const state = agentStates[agent.id] || 'idle';
        const isOnPath = activeSet.has(agent.id);
        const isHov = hoveredAgent === agent.id;
        const isSel = selectedAgent === agent.id;
        const rgb = AGENT_RGB[agent.id];

        let r = isSel ? 24 : isHov ? 22 : 18;
        const breathe = Math.sin(time * 0.002 + idx * 0.7) * 0.3 + 0.7;

        // Glow
        if (state === 'running' || state === 'complete' || isOnPath) {
          const gc = state === 'running' ? 'rgba(34,211,238,0.25)' : state === 'complete' ? 'rgba(52,211,153,0.15)' : 'rgba(34,211,238,0.08)';
          ctx.beginPath(); ctx.arc(pos.x, pos.y, r + 8, 0, Math.PI * 2);
          ctx.fillStyle = gc; ctx.shadowColor = gc; ctx.shadowBlur = state === 'running' ? 20 : 10; ctx.fill(); ctx.shadowBlur = 0;
        }

        // Circle
        ctx.beginPath(); ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
        let fa = .03, sa = breathe * .2;
        if (state === 'running') { fa = .2; sa = 1; } else if (state === 'complete') { fa = .1; sa = .45; } else if (isOnPath) { fa = .08; sa = .5; } else if (isHov || isSel) { fa = .12; sa = .6; }
        ctx.fillStyle = `rgba(${rgb},${fa})`; ctx.fill();
        ctx.strokeStyle = `rgba(${rgb},${sa})`; ctx.lineWidth = state === 'running' ? 2 : 1; ctx.stroke();

        // Inner pulse
        if (state === 'running') {
          const pulse = Math.sin(time * 0.006) * 0.3 + 0.5;
          ctx.beginPath(); ctx.arc(pos.x, pos.y, r * 0.4, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(34,211,238,${pulse})`; ctx.fill();
        }

        // Label
        const la = (state === 'running' || isOnPath || isHov || isSel) ? 1 : .35;
        ctx.fillStyle = `rgba(240,241,243,${la})`;
        ctx.font = `600 ${isSel ? 10 : 9}px 'JetBrains Mono',monospace`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(agent.short, pos.x, pos.y);

        // Name
        if (isHov || isSel || state === 'running') {
          ctx.fillStyle = 'rgba(240,241,243,0.65)';
          ctx.font = "500 10px 'Inter',sans-serif";
          ctx.fillText(agent.name, pos.x, pos.y + r + 14);
        }
      });
    }


    /* ═══════════════════════════════════════════════════════════════════════════
       MAIN APP
       ═══════════════════════════════════════════════════════════════════════════ */
    function App() {
      const [selectedTask, setSelectedTask] = useState(0);
      const [agentStates, setAgentStates] = useState({});
      const [selectedAgent, setSelectedAgent] = useState(null);
      const [hoveredAgent, setHoveredAgent] = useState(null);
      const [log, setLog] = useState([]);
      const [waMsg, setWaMsg] = useState('');
      const [isRunning, setIsRunning] = useState(false);
      const [runStatus, setRunStatus] = useState('idle');
      const [lastRunTs, setLastRunTs] = useState(null);
      const [metrics, setMetrics] = useState(null);
      const [agentLatencies, setAgentLatencies] = useState({});
      const [totalDuration, setTotalDuration] = useState(null);
      const [timelineStep, setTimelineStep] = useState(-1);
      const [calEvents, setCalEvents] = useState([]);

      const canvasRef = useRef(null);
      const animRef = useRef(null);
      const posRef = useRef({});
      const particlesRef = useRef([]);
      const timeoutsRef = useRef([]);
      const logRef = useRef(null);

      const task = TASKS[selectedTask];
      const activePath = task.path;

      // Fetch metrics
      useEffect(() => {
        fetch(`${API}/metrics`, { signal: AbortSignal.timeout(8000) })
          .then(r => r.json()).then(setMetrics).catch(() => { });
      }, []);

      // Fetch calendar
      useEffect(() => {
        fetch(`${API}/calendar`, { signal: AbortSignal.timeout(8000) })
          .then(r => r.json()).then(d => setCalEvents([...(d.today || []), ...(d.tomorrow || [])]))
          .catch(() => { });
      }, []);

      // Auto-scroll log
      useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [log]);

      /* ── Canvas sizing & animation loop ── */
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const container = canvas.parentElement;
        const dpr = window.devicePixelRatio || 1;

        function resize() {
          const w = container.clientWidth;
          const h = container.clientHeight;
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          canvas.style.width = w + 'px';
          canvas.style.height = h + 'px';
          posRef.current = computePositions(w / 2, h / 2, AGENTS);
        }
        resize();
        window.addEventListener('resize', resize);

        const ctx = canvas.getContext('2d');

        function loop(t) {
          const w = canvas.width / dpr;
          const h = canvas.height / dpr;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

          // Update particles
          const pts = particlesRef.current;
          for (let i = pts.length - 1; i >= 0; i--) {
            const p = pts[i];
            p.t += 0.012;
            if (p.t >= 1) { pts.splice(i, 1); continue; }
            p.x = p.x0 + (p.x1 - p.x0) * p.t;
            p.y = p.y0 + (p.y1 - p.y0) * p.t;
            p.alpha = Math.sin(p.t * Math.PI) * 0.8;
          }

          drawGraphPatched(ctx, w, h, posRef.current, agentStates, activePath, hoveredAgent, selectedAgent, pts, t);
          animRef.current = requestAnimationFrame(loop);
        }
        animRef.current = requestAnimationFrame(loop);

        return () => {
          window.removeEventListener('resize', resize);
          cancelAnimationFrame(animRef.current);
        };
      }, [agentStates, activePath, hoveredAgent, selectedAgent]);

      /* ── Spawn particles along active path ── */
      useEffect(() => {
        if (!isRunning) return;
        const iv = setInterval(() => {
          const path = activePath;
          if (!path || path.length < 2) return;
          const pos = posRef.current;
          const idx = Math.floor(Math.random() * (path.length - 1));
          const from = pos[path[idx]], to = pos[path[idx + 1]];
          if (!from || !to) return;
          particlesRef.current.push({ x0: from.x, y0: from.y, x1: to.x, y1: to.y, x: from.x, y: from.y, t: 0, alpha: 0 });
        }, 120);
        return () => clearInterval(iv);
      }, [isRunning, activePath]);

      /* ── Canvas mouse events ── */
      const handleCanvasMove = useCallback((e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const pos = posRef.current;
        let found = null;
        for (const a of AGENTS) {
          const p = pos[a.id];
          if (!p) continue;
          const d = Math.sqrt((mx - p.x) ** 2 + (my - p.y) ** 2);
          if (d < 28) { found = a.id; break; }
        }
        setHoveredAgent(found);
        canvas.style.cursor = found ? 'pointer' : 'default';
      }, []);

      const handleCanvasClick = useCallback(() => {
        if (hoveredAgent) setSelectedAgent(prev => prev === hoveredAgent ? null : hoveredAgent);
      }, [hoveredAgent]);

      /* ── Animation: light up agents in sequence ── */
      const animateSequence = useCallback((agentIds) => {
        timeoutsRef.current.forEach(clearTimeout);
        timeoutsRef.current = [];
        setAgentStates({});
        setTimelineStep(-1);

        const seq = agentIds.filter(id => AGENT_MAP[id]);
        let t = 0;
        seq.forEach((id, i) => {
          const t1 = setTimeout(() => {
            setAgentStates(prev => ({ ...prev, [id]: 'running' }));
            setTimelineStep(i);
            setSelectedAgent(id);
          }, t);
          t += 600;
          const t2 = setTimeout(() => {
            setAgentStates(prev => ({ ...prev, [id]: 'complete' }));
          }, t);
          t += 150;
          timeoutsRef.current.push(t1, t2);
        });

        const tEnd = setTimeout(() => {
          setIsRunning(false);
          setRunStatus('complete');
        }, t + 300);
        timeoutsRef.current.push(tEnd);
      }, []);

      /* ── Log push helper ── */
      const pushLog = useCallback((text, highlight = false) => {
        setLog(prev => [...prev, { id: uid(), ts: now(), text, highlight }]);
      }, []);

      /* ── Build logs from result ── */
      const processResult = useCallback((result, mode) => {
        const dl = result.decision_log || {};
        pushLog(`[SYS] Pipeline complete: ${mode.toUpperCase()}`, true);
        if (dl.disruption) pushLog(`[MNTR] Disruption detected: "${dl.disruption}"`);
        if (dl.severity) pushLog(`[PRTY] Severity: ${dl.severity.toUpperCase()} | Impact: ${dl.hours_impacted ?? 'N/A'}h`);
        if (dl.context_summary) pushLog(`[CTXT] ${dl.context_summary}`);
        if (dl.decision_reasoning) pushLog(`[ORCH] ${dl.decision_reasoning}`);
        (dl.confirmed_schedule || []).forEach(item => {
          pushLog(`[SCHD] ${item.task_name}: ${fmtTime(item.old_time)} -> ${fmtTime(item.new_time)}${item.moved_to_tomorrow ? ' [TOMORROW]' : ''}`);
        });
        Object.entries(dl.routine_decisions || {}).forEach(([name, d]) => {
          if (d.streak_protected) pushLog(`[RTNE] Streak protected: ${name}`, true);
          else if (d.decision) pushLog(`[RTNE] ${name}: ${d.decision.toUpperCase()}`);
        });
        if ((dl.emails_sent || []).length) pushLog(`[NEGO] Staged ${dl.emails_sent.length} reschedule email(s)`);
        setWaMsg(result.whatsapp_message || '');
        setAgentLatencies(result.agent_latencies || {});
        setTotalDuration(result.pipeline_duration_ms || null);
        setLastRunTs(now());

        const fired = (result.agents_fired || []).filter(Boolean);
        animateSequence(fired.length ? fired : activePath);

        setMetrics(m => m ? { ...m, total_runs: (m.total_runs || 0) + 1, last_run_ms: result.pipeline_duration_ms || m.last_run_ms } : null);
      }, [pushLog, animateSequence, activePath]);

      /* ── Trigger demo ── */
      const handleDemo = async () => {
        if (isRunning) return;
        setIsRunning(true); setRunStatus('running'); setWaMsg('');
        setAgentLatencies({}); setTotalDuration(null);
        pushLog('[SYS] Demo pipeline triggered...', true);
        animateSequence(activePath);
        try {
          const r = await fetch(`${API}/demo`, { method: 'POST', signal: AbortSignal.timeout(120000) });
          const result = await r.json();
          if (result.status !== 'ok') throw new Error(result.error || 'non-ok');
          processResult(result, 'demo');
        } catch (err) {
          pushLog(`[ERR] ${err.message}`);
          setIsRunning(false); setRunStatus('idle');
        }
      };

      /* ── Trigger live ── */
      const handleLive = async () => {
        if (isRunning) return;
        setIsRunning(true); setRunStatus('running'); setWaMsg('');
        setAgentLatencies({}); setTotalDuration(null);
        pushLog('[SYS] Live pipeline triggered...', true);
        animateSequence(activePath);
        try {
          const r = await fetch(`${API}/live`, { method: 'POST', signal: AbortSignal.timeout(180000) });
          const result = await r.json();
          if (result.status !== 'ok') throw new Error(result.error || 'non-ok');
          processResult(result, 'live');
          fetch(`${API}/calendar`, { signal: AbortSignal.timeout(8000) })
            .then(r => r.json()).then(d => setCalEvents([...(d.today || []), ...(d.tomorrow || [])])).catch(() => { });
        } catch (err) {
          pushLog(`[ERR] ${err.message}`);
          setIsRunning(false); setRunStatus('idle');
        }
      };

      /* ── Reset ── */
      const handleReset = () => {
        timeoutsRef.current.forEach(clearTimeout);
        timeoutsRef.current = [];
        particlesRef.current = [];
        setAgentStates({}); setLog([]); setWaMsg(''); setIsRunning(false);
        setRunStatus('idle'); setTimelineStep(-1); setSelectedAgent(null);
        setAgentLatencies({}); setTotalDuration(null);
      };

      /* ── Poll /status ── */
      useEffect(() => {
        let alive = true;
        const poll = async () => {
          if (!alive || isRunning) return;
          try {
            const r = await fetch(`${API}/status`, { signal: AbortSignal.timeout(5000) });
            if (!r.ok) return;
            const data = await r.json();
            if (!alive || data.status === 'idle') return;
            // new run detected
            pushLog('[SYS] External pipeline run detected', true);
            const agents = (data.agents || []).filter(Boolean);
            setIsRunning(true); setRunStatus('running');
            animateSequence(agents.length ? agents : activePath);
          } catch { }
        };
        const iv = setInterval(poll, 4000); poll();
        return () => { alive = false; clearInterval(iv); };
      }, [isRunning, animateSequence, pushLog, activePath]);

      /* ── Derived ── */
      const selAgentData = selectedAgent ? AGENT_MAP[selectedAgent] : null;
      const selAgentLatency = selectedAgent ? agentLatencies[selectedAgent] : null;

      return (
        <>
          {/* ── TOP BAR ── */}
          <div className="topbar">
            <h1>PLAN<span>B</span></h1>
            <div className="topbar-right">
              <div className="status-pill">{lastRunTs ? `LAST RUN: ${lastRunTs}` : 'AWAITING INPUT'}</div>
              {totalDuration && <div className="status-pill">PIPELINE: {fmtDuration(totalDuration)}</div>}
            </div>
          </div>

          {/* ── MAIN 3-COLUMN ── */}
          <div className="main">
            {/* LEFT PANEL */}
            <div className="left-panel">
              <div className="panel-header">Scenarios</div>
              <div className="task-list">
                {TASKS.map((t, i) => (
                  <div key={t.id} className={`task-item ${i === selectedTask ? 'active' : ''}`} onClick={() => { setSelectedTask(i); handleReset(); }}>
                    {t.name}
                    <div className="task-mode">{t.mode}</div>
                  </div>
                ))}
              </div>
              <div className="controls">
                <button className="ctrl-btn accent" onClick={handleDemo} disabled={isRunning}>
                  {isRunning && runStatus === 'running' ? '// RUNNING...' : '// TRIGGER DEMO'}
                </button>
                <button className="ctrl-btn alert" onClick={handleLive} disabled={isRunning}>
                  {isRunning && runStatus === 'running' ? '// RUNNING...' : '// LIVE RUN'}
                </button>
                <button className="ctrl-btn" onClick={handleReset}>// RESET</button>
              </div>
            </div>

            {/* CENTER: CANVAS */}
            <div className="center">
              <canvas ref={canvasRef} onMouseMove={handleCanvasMove} onClick={handleCanvasClick} />

              {/* Task header overlay */}
              <div className="task-overlay">
                <h2>{task.name}</h2>
                <div className={`task-status ${runStatus}`}>
                  {runStatus === 'running' ? '[ EXECUTING ]' : runStatus === 'complete' ? '[ COMPLETE ]' : '[ STANDBY ]'}
                </div>
              </div>

              {/* Legend */}
              <div className="legend">
                {Object.entries(AGENT_TYPES).map(([k, v]) => (
                  <div key={k} className="legend-item">
                    <div className="legend-dot" style={{ background: v.color }} />
                    {v.label}
                  </div>
                ))}
              </div>

              {/* Stats */}
              <div className="stats-row">
                <div className="stat-chip">
                  <div className="val">{metrics?.total_runs ?? '--'}</div>
                  <div className="lbl">Runs</div>
                </div>
                <div className="stat-chip">
                  <div className="val">{metrics?.avg_latency_ms != null ? fmtDuration(metrics.avg_latency_ms) : '--'}</div>
                  <div className="lbl">Avg Latency</div>
                </div>
                <div className="stat-chip">
                  <div className="val">{metrics?.habits_protected ?? '--'}</div>
                  <div className="lbl">Habits Saved</div>
                </div>
              </div>

              {/* Timeline */}
              <div className="timeline">
                {activePath.map((agentId, i) => {
                  const agent = AGENT_MAP[agentId];
                  const dotClass = i < timelineStep ? 'done' : i === timelineStep ? 'active' : '';
                  const lineClass = i < timelineStep ? 'done' : i === timelineStep ? 'active' : '';
                  return (
                    <div key={agentId} className="tl-step"
                      onMouseEnter={() => setHoveredAgent(agentId)}
                      onMouseLeave={() => setHoveredAgent(null)}
                      onClick={() => setSelectedAgent(agentId)}>
                      <div className={`tl-dot ${dotClass}`} />
                      {i < activePath.length - 1 && <div className={`tl-line ${lineClass}`} />}
                      <div className={`tl-label ${dotClass}`}>{agent?.short || agentId}</div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* RIGHT PANEL */}
            <div className="right-panel">
              <div className="spotlight">
                {selAgentData ? (
                  <>
                    <div className="spot-header">Agent Spotlight</div>
                    <div className="agent-name" style={{ color: AGENT_TYPES[selAgentData.type]?.color }}>
                      {selAgentData.name}
                    </div>
                    <div className="agent-role">{selAgentData.desc}</div>

                    <div className="agent-section">
                      <div className="agent-section-title">Type</div>
                      <div className="chip" style={{ borderColor: AGENT_TYPES[selAgentData.type]?.color, color: AGENT_TYPES[selAgentData.type]?.color }}>
                        {AGENT_TYPES[selAgentData.type]?.label}
                      </div>
                      <div className="chip">{selAgentData.short}</div>
                    </div>

                    {selAgentLatency != null && (
                      <div className="agent-section">
                        <div className="agent-section-title">Latency</div>
                        <div className="chip">{selAgentLatency}ms</div>
                      </div>
                    )}

                    <div className="agent-section">
                      <div className="agent-section-title">Connections</div>
                      <div style={{ fontSize: '11px', lineHeight: 1.6, color: 'var(--text-dim)' }}>
                        {EDGES.filter(([f, t]) => f === selectedAgent).map(([f, t]) => (
                          <div key={`${f}-${t}`}>
                            <span style={{ color: 'var(--text-dim)' }}>{'-> '}</span>
                            <span style={{ color: 'var(--text)', cursor: 'pointer' }} onClick={() => setSelectedAgent(t)}>
                              {AGENT_MAP[t]?.name || t}
                            </span>
                          </div>
                        ))}
                        {EDGES.filter(([f, t]) => t === selectedAgent).map(([f, t]) => (
                          <div key={`${f}-${t}`}>
                            <span style={{ color: 'var(--text-dim)' }}>{'<- '}</span>
                            <span style={{ color: 'var(--text)', cursor: 'pointer' }} onClick={() => setSelectedAgent(f)}>
                              {AGENT_MAP[f]?.name || f}
                            </span>
                          </div>
                        ))}
                      </div>
                    </div>

                    {waMsg && selectedAgent === 'comms' && (
                      <div className="agent-section">
                        <div className="agent-section-title">WhatsApp Output</div>
                        <div style={{ fontSize: '11px', color: 'var(--text)', lineHeight: 1.6, padding: '8px', border: '1px solid var(--border)', whiteSpace: 'pre-wrap', fontFamily: "'JetBrains Mono',monospace", maxHeight: '200px', overflowY: 'auto' }}>
                          {waMsg}
                        </div>
                      </div>
                    )}
                  </>
                ) : (
                  <div style={{ textAlign: 'center', paddingTop: '60px', color: 'var(--text-dim)' }}>
                    <div style={{ fontSize: '12px', marginBottom: '8px' }}>Click an agent node</div>
                    <div style={{ fontSize: '10px' }}>to view its role and data</div>
                  </div>
                )}
              </div>

              {/* Log stream */}
              <div className="log-panel" ref={logRef}>
                <div className="spot-header" style={{ paddingLeft: 0 }}>System Log</div>
                {log.length === 0 ? (
                  <div className="log-entry">Waiting for pipeline...</div>
                ) : log.map(e => (
                  <div key={e.id} className={`log-entry ${e.highlight ? 'highlight' : ''}`}>
                    <span className="log-ts">{e.ts}</span>{e.text}
                  </div>
                ))}
              </div>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
