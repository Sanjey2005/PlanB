<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PlanB — Mission Control</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel (JSX in-browser transpile) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #1B1B2E; }

    @keyframes pulseAmber {
      0%,100% { box-shadow: 0 0 0 0 rgba(245,158,11,.55); }
      50%      { box-shadow: 0 0 0 7px rgba(245,158,11,0); }
    }
    @keyframes blinkRed {
      0%,100% { opacity: 1; }
      50%      { opacity: .15; }
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(10px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .pulse-amber { animation: pulseAmber .9s ease-in-out infinite; }
    .blink-red   { animation: blinkRed 1.1s ease-in-out infinite; }
    .slide-in    { animation: slideIn .28s ease-out forwards; }
    .fade-up     { animation: fadeUp .4s ease-out forwards; }

    ::-webkit-scrollbar       { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0a14; }
    ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #4a5568; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── API base URL ───────────────────────────────────────────────────────────
   Override via ?api=http://your-server:8000 in the URL.                      */
const API_BASE = new URLSearchParams(window.location.search).get('api')
  || 'http://localhost:8000';

/* ─── Agent definitions (pipeline order) ────────────────────────────────── */
const AGENTS = [
  { id: 'monitor',      label: 'Monitor',      icon: '👁'  },
  { id: 'context',      label: 'Context',      icon: '🧠'  },
  { id: 'resilience',   label: 'Resilience',   icon: '🛡'  },
  { id: 'priority',     label: 'Priority',     icon: '⚡'  },
  { id: 'orchestrator', label: 'Orchestrator', icon: '🎯'  },
  { id: 'replan',       label: 'Replan',       icon: '📋'  },
  { id: 'routine',      label: 'Routine',      icon: '🔄'  },
  { id: 'scheduler',    label: 'Scheduler',    icon: '📅'  },
  { id: 'negotiate',    label: 'Negotiate',    icon: '🤝'  },
  { id: 'predictive',   label: 'Predictive',   icon: '🔮'  },
  { id: 'crisis',       label: 'Crisis',       icon: '🚨'  },
  { id: 'stress',       label: 'Stress',       icon: '😤'  },
  { id: 'undo',         label: 'Undo',         icon: '↩'   },
  { id: 'comms',        label: 'Comms',        icon: '💬'  },
];
const IDLE_STATE = Object.fromEntries(AGENTS.map(a => [a.id, 'idle']));
const AGENT_IDS  = new Set(AGENTS.map(a => a.id));

/* ─── Helpers ────────────────────────────────────────────────────────────── */
let _uid = 0;
const uid   = () => `e${++_uid}-${Date.now()}`;
const now   = () => new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

function fmtTime(iso) {
  if (!iso) return '?';
  try {
    return new Date(iso).toLocaleTimeString('en-IN', {
      hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata',
    });
  } catch { return iso; }
}
function fmtDuration(ms) {
  if (ms == null) return '—';
  return ms >= 1000 ? `${(ms / 1000).toFixed(1)}s` : `${ms}ms`;
}
function avg(arr) {
  if (!arr.length) return null;
  return Math.round(arr.reduce((a, b) => a + b, 0) / arr.length);
}

/* ─── Badge colour palettes ─────────────────────────────────────────────── */
const SEV_PAL = {
  high:   { bg:'#450a0a', fg:'#fca5a5', bd:'#991b1b' },
  medium: { bg:'#451a03', fg:'#fcd34d', bd:'#92400e' },
  low:    { bg:'#052e16', fg:'#86efac', bd:'#166534' },
};
const DEC_PAL = {
  kept:       { bg:'#052e16', fg:'#4ade80', bd:'#166534' },
  dropped:    { bg:'#450a0a', fg:'#f87171', bd:'#991b1b' },
  compressed: { bg:'#451a03', fg:'#fcd34d', bd:'#92400e' },
  delayed:    { bg:'#172554', fg:'#93c5fd', bd:'#1e40af' },
};

/* ═══════════════════════════════════════════════════════════════════════════
   Sub-components
   ═══════════════════════════════════════════════════════════════════════════ */

/* Agent card */
function AgentCard({ agent, status }) {
  const C = {
    idle:     { ring:'#2d3748', bg:'rgba(45,55,72,.25)',   dot:'#4a5568', lbl:'#718096', mark:null           },
    running:  { ring:'#F59E0B', bg:'rgba(245,158,11,.12)', dot:'#F59E0B', lbl:'#fbbf24', mark:'···'          },
    complete: { ring:'#16a34a', bg:'rgba(22,163,74,.12)',  dot:'#22c55e', lbl:'#4ade80', mark:'✓'            },
    error:    { ring:'#dc2626', bg:'rgba(220,38,38,.12)',  dot:'#ef4444', lbl:'#f87171', mark:'✗'            },
  }[status] || { ring:'#2d3748', bg:'rgba(45,55,72,.25)', dot:'#4a5568', lbl:'#718096', mark:null };

  return (
    <div
      className={status === 'running' ? 'pulse-amber' : ''}
      style={{
        display:'flex', alignItems:'center', gap:'8px',
        padding:'7px 10px', borderRadius:'8px', border:`1px solid ${C.ring}`,
        background: C.bg, transition:'all .3s ease',
      }}
    >
      <div style={{ width:'6px', height:'6px', borderRadius:'50%', background:C.dot, flexShrink:0 }} />
      <span style={{ fontSize:'14px', lineHeight:1 }}>{agent.icon}</span>
      <span style={{ fontSize:'11px', fontFamily:'monospace', fontWeight:600, color:C.lbl, letterSpacing:'.04em' }}>
        {agent.label}
      </span>
      {C.mark && (
        <span style={{ marginLeft:'auto', fontSize:'11px', fontFamily:'monospace', color:C.lbl }}>
          {C.mark}
        </span>
      )}
    </div>
  );
}

/* Decision log row */
function LogRow({ entry }) {
  return (
    <div className="slide-in" style={{
      borderLeft:`2px solid #92400e`, paddingLeft:'10px',
      paddingBottom:'10px', marginBottom:'2px',
    }}>
      <div style={{ color:'#6b7280', fontSize:'10px', marginBottom:'3px', fontFamily:'monospace' }}>{entry.ts}</div>
      <div style={{ color:'#d1d5db', fontSize:'12px', lineHeight:'1.55', fontFamily:'monospace' }}>{entry.text}</div>
      {entry.badge && (
        <span style={{
          display:'inline-block', marginTop:'4px', padding:'1px 8px',
          borderRadius:'999px', fontSize:'10px', fontFamily:'monospace',
          background: entry.bg || '#1f2937',
          color:      entry.fg || '#9ca3af',
          border:     `1px solid ${entry.bd || '#374151'}`,
        }}>
          {entry.badge}
        </span>
      )}
    </div>
  );
}

/* WhatsApp phone mockup */
function PhoneMockup({ message }) {
  return (
    <div className="fade-up" style={{
      margin:'12px auto 0', width:'210px',
      background:'#0e1117', borderRadius:'26px',
      border:'2px solid #2d3748', padding:'10px',
      boxShadow:'0 24px 48px rgba(0,0,0,.6)',
    }}>
      {/* Status bar */}
      <div style={{ display:'flex', justifyContent:'space-between', padding:'2px 8px 6px', opacity:.6 }}>
        <span style={{ color:'#9ca3af', fontSize:'10px', fontFamily:'monospace' }}>9:41</span>
        <span style={{ color:'#9ca3af', fontSize:'10px' }}>●●●</span>
      </div>
      {/* WhatsApp header */}
      <div style={{ background:'#075E54', borderRadius:'10px 10px 0 0', padding:'8px 10px', display:'flex', alignItems:'center', gap:'8px' }}>
        <div style={{ width:'26px', height:'26px', borderRadius:'50%', background:'#25D366', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'10px', fontWeight:700, color:'#0a0a0a' }}>PB</div>
        <div>
          <div style={{ color:'#fff', fontSize:'11px', fontWeight:600 }}>PlanB AI</div>
          <div style={{ color:'#a7f3d0', fontSize:'9px' }}>online</div>
        </div>
      </div>
      {/* Chat area */}
      <div style={{ background:'#1a2520', padding:'8px', borderRadius:'0 0 10px 10px' }}>
        <div style={{ background:'#1f3428', borderRadius:'2px 10px 10px 10px', padding:'8px 10px' }}>
          <p style={{ color:'#e2e8f0', fontSize:'11px', lineHeight:'1.55', whiteSpace:'pre-wrap', margin:0, fontFamily:'-apple-system,sans-serif' }}>
            {message}
          </p>
          <p style={{ color:'#6b7280', fontSize:'9px', margin:'4px 0 0', textAlign:'right' }}>just now ✓✓</p>
        </div>
      </div>
      {/* Home bar */}
      <div style={{ width:'36px', height:'3px', background:'#2d3748', borderRadius:'2px', margin:'8px auto 2px' }} />
    </div>
  );
}

/* Stats tile */
function Stat({ label, value, color }) {
  return (
    <div style={{
      flex:1, background:'#0d1117', border:'1px solid #1f2937',
      borderRadius:'10px', padding:'12px 10px', textAlign:'center',
    }}>
      <div style={{ fontSize:'22px', fontWeight:700, fontFamily:'monospace', color: color || '#F59E0B' }}>
        {value}
      </div>
      <div style={{ fontSize:'9px', color:'#6b7280', marginTop:'4px', textTransform:'uppercase', letterSpacing:'.07em' }}>
        {label}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   Main App
   ═══════════════════════════════════════════════════════════════════════════ */
function App() {
  const [statuses,    setStatuses]    = useState({ ...IDLE_STATE });
  const [log,         setLog]         = useState([]);
  const [isLive,      setIsLive]      = useState(false);
  const [lastRunId,   setLastRunId]   = useState(null);
  const [lastRunTs,   setLastRunTs]   = useState(null);
  const [waMsg,       setWaMsg]       = useState('');
  const [demoRunning, setDemoRunning] = useState(false);
  const [statusLine,  setStatusLine]  = useState('Polling /status every 3 s — waiting for first run...');
  const [stats,       setStats]       = useState({ runs:0, avgConf:null, habits:0, duration:null });

  const logRef      = useRef(null);
  const timeoutsRef = useRef([]);

  /* Auto-scroll log */
  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [log]);

  /* Clear animation queue */
  const clearAnim = () => { timeoutsRef.current.forEach(clearTimeout); timeoutsRef.current = []; };

  /* Sequential agent animation */
  const animate = useCallback((names) => {
    clearAnim();
    setStatuses({ ...IDLE_STATE });
    const seq = [...new Set(names)].filter(n => AGENT_IDS.has(n));
    let t = 0;
    seq.forEach(id => {
      const t1 = setTimeout(() => setStatuses(p => ({ ...p, [id]: 'running'   })), t);
      t += 580;
      const t2 = setTimeout(() => setStatuses(p => ({ ...p, [id]: 'complete'  })), t);
      t += 140;
      timeoutsRef.current.push(t1, t2);
    });
    const tEnd = setTimeout(() => { setIsLive(false); setStatusLine('Pipeline complete ✓'); }, t + 350);
    timeoutsRef.current.push(tEnd);
  }, []);

  /* ── Log builder helpers ─────────────────────────────────────────────── */
  const push = useCallback((entries) => setLog(p => [...p, ...entries]), []);

  function makeRow(text, badge, pal) {
    return { id: uid(), ts: now(), text, badge: badge || null,
             bg: pal?.bg, fg: pal?.fg, bd: pal?.bd };
  }

  const logsFromDemo = useCallback((result) => {
    const dl = result.decision_log || {};
    const rows = [];

    rows.push(makeRow(`Disruption: "${dl.disruption || ''}"`, 'DEMO',
      { bg:'#2e1065', fg:'#c084fc', bd:'#7c3aed' }));

    if (dl.severity)
      rows.push(makeRow(
        `Mode: ${dl.mode || '?'} · Severity: ${dl.severity} · Hours impacted: ${dl.hours_impacted ?? 'n/a'}`,
        dl.severity, SEV_PAL[dl.severity]));

    if (dl.context_summary)
      rows.push(makeRow(dl.context_summary, null));

    if (dl.decision_reasoning)
      rows.push(makeRow(`Orchestrator: ${dl.decision_reasoning}`, null));

    if (dl.delegation_depth)
      rows.push(makeRow(`Delegation depth: ${dl.delegation_depth}`, dl.delegation_depth,
        { bg:'#1c1917', fg:'#a8a29e', bd:'#44403c' }));

    /* Confirmed schedule */
    (dl.confirmed_schedule || []).forEach(item => {
      const conf = (dl.confidence_scores || {})[item.task_name];
      const old  = fmtTime(item.old_time);
      const nw   = fmtTime(item.new_time);
      rows.push(makeRow(
        `📅 ${item.task_name}: ${old} → ${nw}${item.moved_to_tomorrow ? ' (→ tomorrow)' : ''}`,
        conf != null ? `${conf}% confidence` : 'moved',
        { bg:'#052e16', fg:'#4ade80', bd:'#166534' }));
    });

    /* Routine decisions + streak protection */
    Object.entries(dl.routine_decisions || {}).forEach(([name, d]) => {
      if (d.streak_protected) {
        rows.push(makeRow(
          `🔥 Streak protected: ${name} kept (dropped ${d.drop_count || 0}× in 3 days)`,
          'protected', { bg:'#431407', fg:'#fdba74', bd:'#9a3412' }));
      } else if (d.decision) {
        rows.push(makeRow(
          `${name}: ${d.decision}${d.reason ? ' — ' + d.reason : ''}`,
          d.decision, DEC_PAL[d.decision]));
      }
    });

    /* Emails */
    const emails = dl.emails_sent || [];
    if (emails.length)
      rows.push(makeRow(
        `📧 ${emails.length} reschedule email${emails.length > 1 ? 's' : ''} staged`,
        `${emails.length} email${emails.length > 1 ? 's' : ''}`,
        { bg:'#172554', fg:'#93c5fd', bd:'#1e40af' }));

    return rows;
  }, []);

  const logsFromStatus = useCallback((data) => {
    const dec  = data.decisions || {};
    const ts   = data.timestamp || now();
    const rows = [];

    rows.push(makeRow(
      `Run detected · mode: ${data.mode || '?'} · severity: ${dec.severity || 'n/a'}`,
      data.mode || 'run', { bg:'#1c1917', fg:'#a8a29e', bd:'#44403c' }));

    if (dec.context_summary)   rows.push(makeRow(dec.context_summary, null));
    if (dec.decision_reasoning) rows.push(makeRow(`Orchestrator: ${dec.decision_reasoning}`, null));

    (dec.confirmed_schedule || []).forEach(item => {
      const conf = (dec.confidence_scores || {})[item.task_name];
      rows.push(makeRow(
        `📅 ${item.task_name}: ${fmtTime(item.old_time)} → ${fmtTime(item.new_time)}`,
        conf != null ? `${conf}%` : null,
        { bg:'#052e16', fg:'#4ade80', bd:'#166534' }));
    });

    Object.entries(dec.routine_decisions || {}).forEach(([name, d]) => {
      if (d.streak_protected)
        rows.push(makeRow(`🔥 Streak protected: ${name}`, 'protected',
          { bg:'#431407', fg:'#fdba74', bd:'#9a3412' }));
      else if (d.decision)
        rows.push(makeRow(`${name}: ${d.decision}`, d.decision, DEC_PAL[d.decision]));
    });

    return rows;
  }, []);

  /* ── Poll /status ────────────────────────────────────────────────────── */
  useEffect(() => {
    let alive = true;
    const poll = async () => {
      if (!alive || demoRunning) return;
      try {
        const r    = await fetch(`${API_BASE}/status`, { signal: AbortSignal.timeout(5000) });
        if (!r.ok) { setStatusLine('Server unreachable — retrying...'); return; }
        const data = await r.json();
        if (!alive) return;

        if (data.status === 'idle') { setStatusLine('Polling /status — no active run'); return; }

        if (data.run_id && data.run_id !== lastRunId) {
          setLastRunId(data.run_id);
          setLastRunTs(data.timestamp || now());
          setIsLive(true);
          setStatusLine(`New run: ${data.run_id.slice(0, 8)}…`);
          const agents = (data.agents || []).filter(Boolean);
          animate(agents.length ? agents : ['monitor','context','resilience','priority','orchestrator','comms']);
          push(logsFromStatus(data));
          setStats(p => ({ ...p, runs: p.runs + 1 }));
        }
      } catch { /* server unreachable */ }
    };
    const iv = setInterval(poll, 3000);
    poll();
    return () => { alive = false; clearInterval(iv); };
  }, [lastRunId, demoRunning, animate, push, logsFromStatus]);

  /* ── Trigger demo ────────────────────────────────────────────────────── */
  const handleDemo = async () => {
    if (demoRunning) return;
    setDemoRunning(true);
    setIsLive(true);
    setWaMsg('');
    setStatusLine('⚡ Demo pipeline running…');

    /* Optimistic animation while we wait for the server */
    animate(['monitor','context','resilience','priority','orchestrator','replan','routine','scheduler','comms']);

    try {
      const r      = await fetch(`${API_BASE}/demo`, { method:'POST', signal: AbortSignal.timeout(120000) });
      const result = await r.json();
      if (result.status !== 'ok') throw new Error(result.error || 'non-ok status');

      /* Re-animate with actual agents fired */
      const actual = (result.agents_fired || []).filter(Boolean);
      setIsLive(true);
      animate(actual.length ? actual : ['monitor','context','resilience','priority','orchestrator','replan','routine','scheduler','comms']);

      setWaMsg(result.whatsapp_message || '');
      push(logsFromDemo(result));

      /* Compute stats */
      const dl     = result.decision_log || {};
      const scores = Object.values(dl.confidence_scores || {}).filter(v => typeof v === 'number');
      const habits = Object.values(dl.routine_decisions || {}).filter(d => d.streak_protected).length;

      setStats(p => ({ ...p, runs: p.runs + 1, avgConf: avg(scores), habits: p.habits + habits, duration: result.pipeline_duration_ms }));
      setLastRunTs(now());
      setStatusLine('Demo complete ✓');

    } catch (err) {
      setStatusLine(`Error: ${err.message}`);
      setIsLive(false);
      setStatuses(p => Object.fromEntries(
        Object.entries(p).map(([k, v]) => [k, v === 'running' ? 'error' : v])
      ));
    } finally {
      setDemoRunning(false);
    }
  };

  const handleReset = () => {
    clearAnim();
    setStatuses({ ...IDLE_STATE });
    setLog([]);
    setWaMsg('');
    setIsLive(false);
    setStatusLine('Polling /status every 3 s — waiting for first run...');
  };

  const completeCount = Object.values(statuses).filter(s => s === 'complete').length;

  /* ── Render ──────────────────────────────────────────────────────────── */
  return (
    <div style={{
      minHeight:'100vh', backgroundColor:'#1B1B2E', padding:'14px',
      display:'flex', flexDirection:'column', gap:'12px',
      fontFamily:"'Courier New', monospace",
    }}>

      {/* ── Header ─────────────────────────────────────────────────────── */}
      <div style={{
        display:'flex', alignItems:'center', justifyContent:'space-between',
        borderBottom:'1px solid #1f2937', paddingBottom:'11px',
      }}>
        <div style={{ display:'flex', alignItems:'center', gap:'11px' }}>
          <div style={{ width:'9px', height:'9px', borderRadius:'50%', background:'#F59E0B', boxShadow:'0 0 10px #F59E0B88' }} />
          <h1 style={{ color:'#F59E0B', fontSize:'18px', fontWeight:700, letterSpacing:'.16em', margin:0, userSelect:'none' }}>
            PLANB MISSION CONTROL
          </h1>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:'14px' }}>
          {isLive && (
            <div style={{ display:'flex', alignItems:'center', gap:'5px' }}>
              <div className="blink-red" style={{ width:'8px', height:'8px', borderRadius:'50%', background:'#ef4444' }} />
              <span style={{ color:'#ef4444', fontSize:'11px', fontWeight:700, letterSpacing:'.1em' }}>LIVE</span>
            </div>
          )}
          <span style={{ color:'#4b5563', fontSize:'10px' }}>
            {lastRunTs ? `Last run: ${lastRunTs}` : statusLine}
          </span>
        </div>
      </div>

      {/* ── Two-column body ─────────────────────────────────────────────── */}
      <div style={{ display:'flex', gap:'14px', flex:1 }}>

        {/* ── LEFT: Agent pipeline ──────────────────────────────────────── */}
        <div style={{ width:'320px', flexShrink:0, display:'flex', flexDirection:'column', gap:'9px' }}>

          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ color:'#F59E0B', fontSize:'10px', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase' }}>
              Agent Pipeline
            </span>
            <span style={{ color:'#4b5563', fontSize:'10px' }}>{completeCount}/{AGENTS.length}</span>
          </div>

          {/* Agent cards — 2-col grid */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'5px' }}>
            {AGENTS.map(a => <AgentCard key={a.id} agent={a} status={statuses[a.id]} />)}
          </div>

          {/* Buttons */}
          <div style={{ display:'flex', gap:'7px', marginTop:'3px' }}>
            <button
              onClick={handleDemo}
              disabled={demoRunning}
              style={{
                flex:1, padding:'10px', borderRadius:'8px', border:'none',
                fontSize:'12px', fontWeight:700, letterSpacing:'.07em',
                fontFamily:"'Courier New', monospace", cursor: demoRunning ? 'not-allowed' : 'pointer',
                background: demoRunning ? '#451a03' : '#F59E0B',
                color:      demoRunning ? '#92400e' : '#1c1917',
                transition:'all .2s',
              }}
            >
              {demoRunning ? '⚡ RUNNING…' : '⚡ TRIGGER DEMO'}
            </button>
            <button
              onClick={handleReset}
              style={{
                padding:'10px 13px', borderRadius:'8px', cursor:'pointer',
                fontSize:'11px', fontFamily:"'Courier New', monospace",
                background:'transparent', border:'1px solid #374151', color:'#6b7280',
                transition:'all .2s',
              }}
            >
              RESET
            </button>
          </div>

          {/* Status line */}
          <div style={{ color:'#4b5563', fontSize:'10px', textAlign:'center' }}>{statusLine}</div>

          {/* WhatsApp mockup */}
          {waMsg && <PhoneMockup message={waMsg} />}
        </div>

        {/* ── RIGHT: Decision log ───────────────────────────────────────── */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', gap:'9px', minWidth:0 }}>

          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <span style={{ color:'#F59E0B', fontSize:'10px', fontWeight:700, letterSpacing:'.1em', textTransform:'uppercase' }}>
              Decision Log
            </span>
            <span style={{ color:'#4b5563', fontSize:'10px' }}>{log.length} entries</span>
          </div>

          <div
            ref={logRef}
            style={{
              flex:1, background:'#0d1117', border:'1px solid #1f2937',
              borderRadius:'12px', padding:'14px', overflowY:'auto',
              maxHeight:'calc(100vh - 200px)',
            }}
          >
            {log.length === 0 ? (
              <div style={{ textAlign:'center', paddingTop:'48px', userSelect:'none' }}>
                <div style={{ fontSize:'44px', marginBottom:'14px' }}>🎯</div>
                <div style={{ color:'#374151', fontSize:'13px' }}>No pipeline runs yet.</div>
                <div style={{ color:'#1f2937', fontSize:'11px', marginTop:'6px' }}>
                  Hit <span style={{ color:'#F59E0B' }}>TRIGGER DEMO</span> or wait for live data.
                </div>
              </div>
            ) : (
              log.map(e => <LogRow key={e.id} entry={e} />)
            )}
          </div>
        </div>
      </div>

      {/* ── Stats bar ───────────────────────────────────────────────────── */}
      <div style={{ display:'flex', gap:'9px' }}>
        <Stat label="Pipeline Runs Today"  value={stats.runs}                                              color="#F59E0B" />
        <Stat label="Avg Confidence"       value={stats.avgConf != null ? `${stats.avgConf}%` : '—'}      color="#34d399" />
        <Stat label="Habits Protected"     value={stats.habits}                                            color="#f97316" />
        <Stat label="Last Run Duration"    value={fmtDuration(stats.duration)}                            color="#a78bfa" />
      </div>

      {/* ── Footer ──────────────────────────────────────────────────────── */}
      <div style={{ textAlign:'center', color:'#1f2937', fontSize:'10px', letterSpacing:'.05em' }}>
        PlanB · NeoVerse 26 Hackathon · polling {API_BASE || 'same-origin'}/status every 3 s
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
